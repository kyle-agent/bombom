name: Deploy demo + read-only viewer to GitHub Pages

# Publishes two static, backend-free pages to GitHub Pages:
#   index.html   — interactive rack-layout demo (zoom/pan/click-detail, light theme)
#   viewer.html  — read-only bombom viewer (bombom export)
# Editing stays via `bombom serve` / PRs — Pages is view-only (the cost data is public-OK).
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [claude/vibrant-tesla-okhpxz, main]
    paths:
      - "offerings/**"
      - "pricing/**"
      - "categories/**"
      - "meta/**"
      - "web/viewer.html"
      - "web/layout.html"
      - "scripts/build_static_demo.py"
      - "scripts/demo.py"
      - "bombom/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive      # pull the devicetype-library catalog submodule
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ensure catalog submodule
        run: git submodule update --init --depth 1 vendor/devicetype-library
      - run: pip install -e .
      - name: Build catalog index
        run: bombom catalog reindex
      - name: Build static demo (interactive rack-layout, landing page) + viewer
        run: |
          mkdir -p public
          python scripts/build_static_demo.py --out public/index.html
          bombom export public/viewer.html --path offerings/cloud-a
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
