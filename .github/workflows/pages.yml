name: Deploy full-app static demo to GitHub Pages

# Publishes the WHOLE bombom app as a backend-free, read-only static demo:
#   index.html — landing menu; viewer / dashboard / placed / layout / manage / candidates /
#   diff / health / search — every screen, with a filled showcase dataset baked in.
# Built by scripts/build_static_app.py (captures GET responses + injects a fetch shim).
# Editing stays via `bombom serve` / PRs — Pages is view-only (the cost data is public-OK).
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [claude/vibrant-tesla-okhpxz, main]
    paths:
      - "web/**"
      - "scripts/build_static_app.py"
      - "scripts/showcase.py"
      - "bombom/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive      # pull the devicetype-library catalog submodule
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ensure catalog submodule
        run: git submodule update --init --depth 1 vendor/devicetype-library
      - run: pip install -e .
      - name: Build catalog index
        run: bombom catalog reindex
      - name: Build full-app static demo (all screens, filled showcase data)
        run: python scripts/build_static_app.py --out public
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
