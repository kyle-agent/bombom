<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bombom — 랙관리</title>
<style>
 :root{--accent:#2563eb;--accent2:#0ea5e9;--ink:#0f172a;--muted:#64748b;--line:#e7ebf0;
   --ok:#16a34a;--bad:#dc2626;font-family:system-ui,-apple-system,'Noto Sans KR',sans-serif}
 *{box-sizing:border-box}
 body{margin:0;background:#f4f6f9;color:var(--ink)}
 header{display:flex;gap:10px;align-items:center;padding:12px 22px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:5}
 .logo{font-weight:800;font-size:17px;color:var(--accent);letter-spacing:-.2px}
 .crumb{color:var(--muted);font-size:13px}
 nav{margin-left:auto;display:flex;gap:2px}
 nav a{color:#475569;text-decoration:none;font-size:13px;padding:6px 10px;border-radius:7px}
 nav a:hover{background:#f1f5f9}
 .app{display:grid;grid-template-columns:280px 1fr;gap:0;height:calc(100vh - 53px)}
 /* sidebar tree */
 .side{background:#fff;border-right:1px solid var(--line);overflow:auto;padding:10px 0}
 .side .sh{padding:6px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
 .tnode{user-select:none}
 .toff{padding:7px 14px;font-weight:700;font-size:13px;color:#0f172a}
 .treg{padding:4px 14px 4px 26px;font-weight:600;font-size:12px;color:#334155}
 .tzone{padding:3px 14px 3px 38px;font-size:12px;color:#475569;display:flex;align-items:center;gap:6px}
 .tzone .zdot{width:7px;height:7px;border-radius:50%;background:#cbd5e1}
 .trt{margin:1px 14px 1px 50px;padding:4px 10px;font-size:12px;border-radius:7px;cursor:pointer;
   display:flex;align-items:center;gap:7px;color:#475569}
 .trt:hover{background:#f1f5f9;color:#0f172a}
 .trt.on{background:#eff6ff;color:var(--accent);font-weight:700}
 .trt .cnt{margin-left:auto;font-size:11px;color:#94a3b8;font-variant-numeric:tabular-nums}
 .trt.on .cnt{color:var(--accent)}
 .empty{color:#94a3b8;font-size:12px;padding:10px 16px}
 /* main */
 .main{overflow:auto;padding:18px 22px 60px}
 .mbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
 .mbar .path{font-size:15px;font-weight:700}
 .mbar .path .sep{color:#cbd5e1;margin:0 5px;font-weight:400}
 .mbar .sub{color:var(--muted);font-size:12px}
 .mbar .spacer{flex:1}
 .addbtn{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:9px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}
 .addbtn:hover{filter:brightness(1.06)}
 .addbtn:disabled{opacity:.4;cursor:not-allowed}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
 .rack{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 1px 3px rgba(15,23,42,.04);display:flex;flex-direction:column;gap:8px}
 .rack .rh{display:flex;align-items:baseline;gap:8px}
 .rack .rh b{font-size:15px}
 .rack .rh .rt{font-size:11px;color:#fff;background:var(--accent);border-radius:5px;padding:1px 6px;font-weight:600}
 .rack .rh .rt.gpu{background:#7c3aed}.rack .rh .rt.storage{background:#9333ea}.rack .rh .rt.network{background:#16a34a}
 .rack .meta{color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums}
 .rack .elev{display:flex;justify-content:center;background:#f8fafc;border:1px solid #f1f5f9;border-radius:8px;padding:6px;min-height:90px;overflow:hidden}
 .rack .elev svg{max-height:220px;height:auto;width:auto}
 .rack .btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
 .rack .btns a,.rack .btns button{flex:1;text-align:center;border:1px solid var(--line);background:#fff;color:#334155;
   border-radius:8px;padding:6px 4px;font-size:11.5px;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap}
 .rack .btns a.place{border-color:#bfdbfe;background:#eff6ff;color:var(--accent)}
 .rack .btns a:hover,.rack .btns button:hover{filter:brightness(.98);border-color:#cbd5e1}
 .hint{color:#94a3b8;font-size:13px;text-align:center;padding:60px 20px}
 /* modal */
 .back{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:30}
 .back.show{display:flex}
 .modal{background:#fff;border-radius:16px;padding:20px 22px;width:min(440px,92vw);box-shadow:0 20px 60px rgba(0,0,0,.3)}
 .modal h3{margin:0 0 14px;font-size:16px}
 .modal label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
 .modal input,.modal select{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:8px 10px;font-size:13px}
 .mres{max-height:170px;overflow:auto;border:1px solid var(--line);border-radius:8px;margin-top:6px}
 .mres .it{padding:7px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid #f4f6f9;display:flex;justify-content:space-between;gap:8px}
 .mres .it:hover{background:#f1f5f9}.mres .it.on{background:#eff6ff;color:var(--accent);font-weight:600}
 .mres .it .u{color:#94a3b8;font-variant-numeric:tabular-nums}
 .modal .act{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
 .modal .act button{border-radius:9px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:#fff;color:#334155}
 .modal .act button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
 .modal .err{color:var(--bad);font-size:12px;margin-top:8px;min-height:16px}
 /* toast */
 #toast{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:50}
 #toast .t{background:#0f172a;color:#e2e8f0;border-radius:9px;padding:9px 15px;font-size:12px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
 #toast .t.ok{background:#166534}#toast .t.bad{background:#7f1d1d}
 @media(max-width:780px){.app{grid-template-columns:1fr;height:auto}.side{height:auto;max-height:260px}}
</style>
<style id="cxbar">
header{background:#fff!important;color:#0f172a!important;border-bottom:1px solid #e7ebf0!important}
header .logo,header .ab-logo{color:#2563eb!important}
header .crumb{color:#64748b!important}
header nav a,header .topnav a,header .links a{color:#475569!important;background:transparent!important;border:1px solid transparent!important;font-weight:500!important;border-radius:7px!important;padding:5px 9px!important;text-decoration:none!important}
header nav a:hover,header .topnav a:hover,header .links a:hover{background:#f1f5f9!important;color:#0f172a!important}
header nav a.on,header .topnav a.on,header .links a.on{background:#eff6ff!important;color:#2563eb!important;font-weight:700!important}
</style>
<script>addEventListener('DOMContentLoaded',function(){function st(h){h=(h||'').split('?')[0].split('#')[0].replace(/^.*\//,'').replace(/\.html$/,'');return h||'index';}var cur=st(location.pathname);if(cur==='home')cur='index';document.querySelectorAll('header a[href]').forEach(function(a){if(a.classList.contains('logo')||a.classList.contains('ab-logo'))return;var s=st(a.getAttribute('href'));if(s==='home')s='index';if(s===cur)a.classList.add('on');});});</script>
</head>
<body>
<header>
 <span class="logo">bombom</span><span class="crumb">— 랙관리</span>
 <nav class="topnav"><a href="/">메인</a><a href="/candidates">후보풀</a><a href="/placed">배치 목록</a><a href="/summary">투자 리포트</a><a href="/manage">기준정보</a><a href="/edit">랙관리</a></nav>
</header>
<div class="app">
 <aside class="side">
   <div class="sh">랙타입 선택</div>
   <div id="tree"><div class="empty">불러오는 중…</div></div>
 </aside>
 <section class="main">
   <div class="mbar">
     <div>
       <div class="path" id="crumb">랙타입을 선택하세요</div>
       <div class="sub" id="subcrumb">좌측에서 오퍼링 · 리전 · 존 아래 랙타입을 고르면 해당 랙 목록이 보입니다.</div>
     </div>
     <span class="spacer"></span>
     <button class="addbtn" id="addBtn" disabled>＋ 랙 추가</button>
   </div>
   <div id="racks"><div class="hint">랙타입을 선택하면 그 안의 랙들을 관리할 수 있습니다.<br>서버·장비 배치는 각 랙의 <b>🗺 배치</b>에서 진행합니다.</div></div>
 </section>
</div>

<!-- add rack modal -->
<div class="back" id="addModal">
 <div class="modal">
   <h3>랙 추가</h3>
   <div class="sub" id="amTarget" style="font-size:12px;color:#64748b"></div>
   <label>랙 ID (영문/숫자/.-_)</label>
   <input id="amRack" placeholder="예: R04, web-01">
   <label>랙 모델 (Rack-Type 인클로저)</label>
   <input id="amModelQ" placeholder="제조사/모델 검색… 예: vertiv, apc">
   <div class="mres" id="amModelRes"></div>
   <div class="err" id="amErr"></div>
   <div class="act"><button id="amCancel">취소</button><button class="primary" id="amSave">추가</button></div>
 </div>
</div>

<div id="toast"></div>
<script>
"use strict";
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(m,k){const w=document.getElementById('toast');const e=document.createElement('div');e.className='t'+(k?' '+k:'');e.textContent=m;w.appendChild(e);setTimeout(()=>e.remove(),3000);}
async function getJSON(u){const r=await fetch(u);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
async function postJSON(u,b){const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});let d=null;try{d=await r.json();}catch(e){}if(!r.ok){const det=(d&&d.detail)?(typeof d.detail==='string'?d.detail:JSON.stringify(d.detail)):'HTTP '+r.status;const e=new Error(det);e.status=r.status;throw e;}return d;}

const RTC={compute:'',gpu:'gpu',storage:'storage',network:'network'};
let HIER=[], SEL=null;   // SEL = {key,offering,region,zone,rack_type,zlabel}

function nodePath(s){return `offerings/${s.offering}/regions/${s.region}/zones/${s.zone}/rack-types/${s.rack_type}`;}

// ── sidebar tree ────────────────────────────────────────────────────────
function renderTree(){
  const box=document.getElementById('tree');
  if(!HIER.length){box.innerHTML='<div class="empty">등록된 오퍼링이 없습니다. 기준정보에서 추가하세요.</div>';return;}
  let h='';
  for(const o of HIER){
    h+=`<div class="tnode"><div class="toff">${esc(o.name||o.offering)}</div>`;
    for(const rg of (o.regions||[])){
      h+=`<div class="treg">${esc(rg.name||rg.region)}</div>`;
      const zs=rg.zones||[];
      if(!zs.length){h+=`<div class="empty" style="padding:2px 14px 2px 38px">존 없음</div>`;}
      for(const z of zs){
        h+=`<div class="tzone"><span class="zdot"></span>${esc(z.name||z.zone)}</div>`;
        const rts=z.rack_types||[];
        if(!rts.length){h+=`<div class="empty" style="padding:2px 14px 2px 50px">랙타입 없음</div>`;}
        for(const rt of rts){
          const cnt=(rt.racks||[]).length;
          const key=`${o.offering}|${rg.region}|${z.zone}|${rt.rack_type}`;
          const on=SEL&&SEL.key===key?' on':'';
          h+=`<div class="trt${on}" data-key="${esc(key)}" data-off="${esc(o.offering)}" data-reg="${esc(rg.region)}" data-zone="${esc(z.zone)}" data-rt="${esc(rt.rack_type)}" data-zlabel="${esc(z.name||z.zone)}">`
            +`▦ ${esc(rt.name&&rt.name!==rt.rack_type?rt.name:rt.rack_type)}<span class="cnt">${cnt}</span></div>`;
        }
      }
    }
    h+=`</div>`;
  }
  box.innerHTML=h;
}

document.getElementById('tree').addEventListener('click',e=>{
  const n=e.target.closest('.trt');if(!n)return;
  SEL={key:n.dataset.key,offering:n.dataset.off,region:n.dataset.reg,zone:n.dataset.zone,
       rack_type:n.dataset.rt,zlabel:n.dataset.zlabel};
  renderTree();
  loadRacks();
});

// ── rack list for selected rack-type ────────────────────────────────────
async function loadRacks(){
  if(!SEL)return;
  document.getElementById('crumb').innerHTML=
    `${esc(SEL.offering)}<span class="sep">›</span>${esc(SEL.region)}<span class="sep">›</span>${esc(SEL.zlabel)}<span class="sep">›</span><span style="color:var(--accent)">▦ ${esc(SEL.rack_type)}</span>`;
  document.getElementById('subcrumb').textContent='이 랙타입의 랙을 추가·복제하고, 각 랙에서 장비를 배치합니다.';
  document.getElementById('addBtn').disabled=false;
  const box=document.getElementById('racks');
  box.innerHTML='<div class="hint">불러오는 중…</div>';
  try{
    const d=await getJSON('/api/layout?path='+encodeURIComponent(nodePath(SEL)));
    const racks=(d.racks||[]).filter(r=>(r.hierarchy||{}).rack_type===SEL.rack_type);
    if(!racks.length){box.innerHTML='<div class="hint">아직 랙이 없습니다. <b>＋ 랙 추가</b>로 첫 랙을 만드세요.</div>';return;}
    box.innerHTML='<div class="grid">'+racks.map(rackCard).join('')+'</div>';
  }catch(err){box.innerHTML='<div class="hint">불러오기 실패: '+esc(err.message)+'</div>';}
}

function rackCard(r){
  const rt=r.hierarchy.rack_type;
  const file=nodePath(SEL)+'/racks/'+r.rack_id+'.yaml';
  const placePath=`offerings/${SEL.offering}/regions/${SEL.region}/zones/${SEL.zone}`;
  return `<div class="rack">
    <div class="rh"><b>${esc(r.rack_id)}</b><span class="rt ${RTC[rt]||''}">${esc(rt)}</span></div>
    <div class="meta">${esc(r.rack_model||'—')} · ${r.rack_u||'?'}U</div>
    <div class="elev">${r.svg||''}</div>
    <div class="btns">
      <a class="place" href="/place?path=${encodeURIComponent(placePath)}" title="이 존의 배치 화면 열기">🗺 배치</a>
      <button data-clone="${esc(file)}" data-id="${esc(r.rack_id)}">⧉ 복제</button>
      <button data-bulk="${esc(file)}" data-id="${esc(r.rack_id)}">⧉ 여러 개</button>
    </div></div>`;
}

// ── clone / bulk clone ──────────────────────────────────────────────────
function expandIds(spec){
  // "R10,R11" or "web-02..05" → list. Range token "A..B": share alpha prefix, numeric span, zero-pad.
  const out=[];
  spec.split(',').map(s=>s.trim()).filter(Boolean).forEach(tok=>{
    const m=tok.match(/^(.*?)(\d+)\.\.(\d+)$/);
    if(m){const pre=m[1],a=m[2],b=parseInt(m[3],10),pad=a.length;
      for(let i=parseInt(a,10);i<=b;i++)out.push(pre+String(i).padStart(pad,'0'));}
    else out.push(tok);
  });
  return [...new Set(out)];
}
document.getElementById('racks').addEventListener('click',async e=>{
  const cb=e.target.closest('[data-clone]');
  if(cb){const nid=prompt('복제본 랙 ID (배치 그대로 복사)','');if(nid==null)return;const rack=nid.trim();if(!rack)return;
    try{await postJSON('/api/rack/clone',{source_path:cb.dataset.clone,rack});toast('복제됨 → '+rack,'ok');loadRacks();refreshHier();}
    catch(err){toast(err.status===409?'이미 존재하는 랙입니다':err.message,'bad');}return;}
  const bb=e.target.closest('[data-bulk]');
  if(bb){const spec=prompt('여러 랙 ID (쉼표 또는 범위). 예: R10,R11  또는  web-02..05','');if(spec==null)return;
    const racks=expandIds(spec);if(!racks.length){toast('ID를 입력하세요','bad');return;}
    try{const d=await postJSON('/api/rack/clone-bulk',{source_path:bb.dataset.bulk,racks});toast((d.count||racks.length)+'개 복제됨','ok');loadRacks();refreshHier();}
    catch(err){toast(err.status===409?'이미 존재하는 랙이 있습니다':err.message,'bad');}return;}
});

// ── add rack ────────────────────────────────────────────────────────────
let amModel=null, amTimer=null;
const addModal=document.getElementById('addModal');
document.getElementById('addBtn').addEventListener('click',()=>{
  if(!SEL)return;
  amModel=null;
  document.getElementById('amTarget').textContent=`${SEL.offering} › ${SEL.region} › ${SEL.zlabel} › ${SEL.rack_type}`;
  document.getElementById('amRack').value='';
  document.getElementById('amModelQ').value='';
  document.getElementById('amErr').textContent='';
  document.getElementById('amModelRes').innerHTML='';
  addModal.classList.add('show');
  searchModels('');
});
document.getElementById('amCancel').addEventListener('click',()=>addModal.classList.remove('show'));
addModal.addEventListener('click',e=>{if(e.target===addModal)addModal.classList.remove('show');});
document.getElementById('amModelQ').addEventListener('input',e=>{clearTimeout(amTimer);const q=e.target.value;amTimer=setTimeout(()=>searchModels(q),180);});
async function searchModels(q){
  const box=document.getElementById('amModelRes');
  try{
    const rows=await getJSON('/api/catalog/search?kind=rack&limit=30&q='+encodeURIComponent(q));
    if(!rows.length){box.innerHTML='<div class="it" style="color:#94a3b8;cursor:default">결과 없음</div>';return;}
    box.innerHTML=rows.map(r=>`<div class="it${amModel&&amModel.slug===r.slug?' on':''}" data-slug="${esc(r.slug)}" data-u="${r.u_height||0}">`
      +`<span>${esc(r.manufacturer||'')} ${esc(r.model||r.slug)}</span><span class="u">${r.u_height||'?'}U</span></div>`).join('');
  }catch(err){box.innerHTML='<div class="it" style="color:#94a3b8;cursor:default">모델 검색 불가 (데모에서는 비활성)</div>';}
}
document.getElementById('amModelRes').addEventListener('click',e=>{
  const it=e.target.closest('.it[data-slug]');if(!it)return;
  amModel={slug:it.dataset.slug,u_height:+it.dataset.u};
  [...document.querySelectorAll('#amModelRes .it')].forEach(x=>x.classList.toggle('on',x===it));
});
document.getElementById('amSave').addEventListener('click',async ()=>{
  const rack=document.getElementById('amRack').value.trim();
  const err=document.getElementById('amErr');err.textContent='';
  if(!rack){err.textContent='랙 ID를 입력하세요';return;}
  if(!amModel){err.textContent='랙 모델을 선택하세요';return;}
  try{
    await postJSON('/api/rack/new',{offering:SEL.offering,region:SEL.region,zone:SEL.zone,
      rack_type:SEL.rack_type,rack,rack_model:amModel.slug});
    addModal.classList.remove('show');toast('랙 "'+rack+'" 추가됨','ok');loadRacks();refreshHier();
  }catch(e2){err.textContent=e2.status===409?'이미 존재하는 랙입니다':e2.message;}
});

// ── load ────────────────────────────────────────────────────────────────
async function refreshHier(){try{HIER=await getJSON('/api/hierarchy');renderTree();}catch(e){}}
getJSON('/api/hierarchy').then(d=>{HIER=Array.isArray(d)?d:[];renderTree();})
  .catch(e=>{document.getElementById('tree').innerHTML='<div class="empty">불러오기 실패: '+esc(e.message)+'</div>';});
</script>
</body></html>
