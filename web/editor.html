<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bombom — 랙관리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
 :root{font-family:"Pretendard",system-ui,-apple-system,sans-serif}
 *{box-sizing:border-box}
 body{margin:0;background:#f4f6f9;color:#0f172a;-webkit-font-smoothing:antialiased}
 @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
 .sk{background:#e9edf2;background-image:linear-gradient(90deg,#e9edf2 0,#f3f6fa 200px,#e9edf2 400px);background-size:800px 100%;animation:shimmer 1.2s linear infinite;border-radius:8px}
 header.top{display:flex;gap:12px;align-items:center;padding:11px 22px;border-bottom:1px solid #e7ebf0;background:#fff;position:sticky;top:0;z-index:7;flex-wrap:wrap}
 header.top .logo{font-weight:800;font-size:17px;color:#2563eb;letter-spacing:-.2px}
 header.top .crumb{color:#64748b;font-size:13px}
 header.top nav{margin-left:auto;display:flex;gap:2px;align-items:center}
 header.top nav a{color:#475569;text-decoration:none;font-size:13px;padding:6px 11px;border-radius:7px}
 header.top nav a:hover{background:#f1f5f9}
 header.top nav a.on{color:#2563eb;background:#eff6ff;font-weight:700}
 .wrap{max-width:1080px;margin:0 auto;padding:18px 22px 60px}
 .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
 .toolbar .lead{font-size:14px;color:#475569}
 .toolbar .lead b{color:#0f172a}
 .toolbar .uncl{color:#b45309;font-weight:600}
 .addbtn{margin-left:auto;font-size:13px;border:1px solid #2563eb;border-radius:8px;background:#2563eb;color:#fff;padding:8px 14px;cursor:pointer;font-weight:600;font-family:inherit}
 .addbtn:hover{filter:brightness(1.06)}
 .intro{font-size:12.5px;color:#94a3b8;margin:0 0 16px}
 .grp{margin-bottom:20px}
 .grp .gh{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;margin:0 0 8px}
 .grp .gh .sq{width:11px;height:11px;border-radius:3px}
 .grp .gh .gc{color:#64748b;font-weight:400;font-size:12px}
 .grp .gh .need{color:#b45309;font-size:11px;background:#fffbeb;border:1px solid #fde68a;border-radius:20px;padding:1px 8px;font-weight:600}
 .gtable{background:#fff;border:1px solid #e7ebf0;border-radius:12px;overflow:hidden}
 table{width:100%;border-collapse:collapse}
 th{text-align:left;padding:9px 14px;background:#f8fafc;color:#64748b;font-weight:600;font-size:11px;border-bottom:1px solid #f1f5f9}
 td{padding:9px 14px;border-bottom:1px solid #f4f6f9;font-size:13px;vertical-align:middle}
 tr:last-child td{border-bottom:0}
 td .rid{font-weight:700}
 td .rmodel{color:#94a3b8;font-size:11px;margin-left:6px}
 td.loc{color:#64748b;font-size:12.5px}
 select.rt{font-size:13px;padding:5px 8px;border-radius:7px;font-family:inherit;font-weight:600;cursor:pointer}
 .actlink{border:1px solid #e2e8f0;background:#fff;color:#334155;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;font-family:inherit}
 .actlink.place{border-color:#bfdbfe;background:#eff6ff;color:#2563eb}
 .actlink:hover{border-color:#cbd5e1}
 .acts{display:flex;gap:6px;justify-content:flex-end}
 .empty{padding:50px;text-align:center;color:#94a3b8}
 /* modal */
 .back{position:fixed;inset:0;background:rgba(15,23,42,.35);display:none;align-items:flex-start;justify-content:center;z-index:30}
 .back.show{display:flex}
 .modal{background:#fff;border-radius:12px;margin-top:60px;width:560px;max-width:92vw;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(15,23,42,.25)}
 .modal .mh{padding:12px 16px;border-bottom:1px solid #e7ebf0;display:flex;align-items:center;gap:10px}
 .modal .mh b{font-size:14px}.modal .mh .x{margin-left:auto;cursor:pointer;color:#94a3b8;font-size:20px}
 .modal .mb{padding:12px 16px;overflow:auto}
 .modal label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;margin:10px 0 4px}
 .modal input,.modal select{width:100%;padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;font-family:inherit}
 .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
 .mres{margin-top:6px;border:1px solid #e7ebf0;border-radius:9px;max-height:200px;overflow:auto}
 .mres .it{display:flex;align-items:center;gap:9px;padding:8px 10px;border-bottom:1px solid #f4f6f9;cursor:pointer}
 .mres .it:last-child{border-bottom:0}
 .mres .it:hover{background:#f1f5f9}
 .mres .it.on{background:#eff6ff}
 .mres .it .ico{width:26px;height:26px;border-radius:6px;background:#eef2ff;color:#4338ca;display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 auto}
 .mres .it .mt{flex:1;min-width:0}
 .mres .it .mt .m{font-size:13px;font-weight:600}.mres .it .mt .s{font-size:11px;color:#64748b}
 .mres .it .u{font-size:11px;color:#94a3b8;font-variant-numeric:tabular-nums}
 .mfoot{padding:12px 16px;border-top:1px solid #e7ebf0;display:flex;gap:8px;justify-content:flex-end}
 .mfoot .err{margin-right:auto;color:#b91c1c;font-size:12px;align-self:center}
 .mfoot button{border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#334155;font-family:inherit}
 .mfoot button.primary{background:#2563eb;color:#fff;border-color:#2563eb}
 #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:13px;padding:8px 14px;border-radius:8px;opacity:0;transition:.2s;pointer-events:none;z-index:40}
 #toast.on{opacity:.97}
</style>
</head>
<body>
<header class="top">
 <span class="logo">bombom</span><span class="crumb">— 랙관리 · 랙타입 분류</span>
 <nav>
  <a href="/">메인</a>
  <a href="/candidates">후보풀</a>
  <a href="/placed">배치 목록</a>
  <a href="/summary">투자 리포트</a>
  <a href="/manage">기준정보</a>
  <a href="/edit" class="on">랙관리</a>
 </nav>
</header>
<div class="wrap">
 <div class="toolbar">
   <span class="lead">랙 <b id="total">—</b>개<span id="unclWrap" style="display:none"> · <span class="uncl">미분류 <span id="uncl">0</span></span></span></span>
   <button class="addbtn" id="addBtn">＋ 랙 추가</button>
 </div>
 <p class="intro">카탈로그에서 랙을 골라 담고, 각 랙의 <b>랙타입</b>을 지정하세요. 랙타입을 바꾸면 해당 그룹으로 이동합니다.</p>
 <div id="body"><div class="sk" style="height:30px;width:120px;margin:8px 0 10px"></div><div class="sk" style="height:130px;margin-bottom:18px"></div><div class="sk" style="height:90px"></div></div>
</div>

<!-- add rack modal -->
<div class="back" id="addModal">
 <div class="modal">
   <div class="mh"><b>＋ 랙 추가 (카탈로그에서 선택)</b><span class="x" id="amX">×</span></div>
   <div class="mb">
     <div class="grid2">
       <div><label>존 (위치)</label><select id="amZone"></select></div>
       <div><label>랙타입</label><select id="amType">
         <option value="compute">컴퓨트</option><option value="gpu">GPU</option>
         <option value="storage">스토리지</option><option value="network">네트워크</option></select></div>
     </div>
     <label>랙 ID</label><input id="amRack" placeholder="예: rk-ane2-c-01">
     <label>랙 모델 (카탈로그)</label>
     <input id="amQ" placeholder="랙 모델 검색… 예: vertiv, apc, 42U">
     <div class="mres" id="amRes"></div>
   </div>
   <div class="mfoot"><span class="err" id="amErr"></span>
     <button id="amCancel">취소</button><button class="primary" id="amSave">＋ 담기</button></div>
 </div>
</div>
<div id="toast"></div>
<script>
"use strict";
const TYPES=[
  {id:'',label:'미분류',color:'#b45309'},
  {id:'compute',label:'컴퓨트',color:'#2563eb'},
  {id:'gpu',label:'GPU',color:'#7c3aed'},
  {id:'storage',label:'스토리지',color:'#9333ea'},
  {id:'network',label:'네트워크',color:'#16a34a'},
];
const KNOWN=new Set(TYPES.map(t=>t.id));
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('on'),1800);}
function labelOf(t){const x=TYPES.find(v=>v.id===(t||''));return x?x.label:t;}
function colorOf(t){const x=TYPES.find(v=>v.id===(t||''));return x?x.color:'#64748b';}
function fileOf(r){const h=r.hierarchy;return `offerings/${h.offering}/regions/${h.region}/zones/${h.zone}/rack-types/${h.rack_type}/racks/${r.rack_id}.yaml`;}

let RACKS=[], HIER=[];

function render(){
  const total=RACKS.length, uncl=RACKS.filter(r=>!KNOWN.has(r.hierarchy.rack_type)||r.hierarchy.rack_type==='').length;
  document.getElementById('total').textContent=total;
  document.getElementById('uncl').textContent=uncl;
  document.getElementById('unclWrap').style.display=uncl?'inline':'none';
  // group order: any unknown/'' types first (지정 필요), then the standard order, then leftovers
  const present=[...new Set(RACKS.map(r=>r.hierarchy.rack_type))];
  const ordered=[...present.filter(t=>!KNOWN.has(t)),'compute','gpu','storage','network'].filter((t,i,a)=>present.includes(t)&&a.indexOf(t)===i);
  let h='';
  for(const t of ordered){
    const items=RACKS.filter(r=>r.hierarchy.rack_type===t);
    if(!items.length) continue;
    const unknown=!KNOWN.has(t);
    h+=`<div class="grp"><div class="gh"><span class="sq" style="background:${unknown?'#b45309':colorOf(t)}"></span>${esc(unknown?t:labelOf(t))}<span class="gc">· ${items.length}개</span>${unknown?'<span class="need">랙타입 확인</span>':''}</div>
      <div class="gtable"><table><thead><tr><th>랙</th><th>위치</th><th style="width:150px">랙타입</th><th style="width:150px"></th></tr></thead><tbody>`;
    for(const r of items){
      const h2=r.hierarchy, cur=h2.rack_type, amber=unknown;
      const opts=[...KNOWN, ...(KNOWN.has(cur)?[]:[cur])].filter(Boolean);
      const sel=opts.map(o=>`<option value="${esc(o)}" ${o===cur?'selected':''}>${esc(labelOf(o))}</option>`).join('');
      const placePath=`offerings/${h2.offering}/regions/${h2.region}/zones/${h2.zone}`;
      h+=`<tr>
        <td><span class="rid">${esc(r.rack_id)}</span><span class="rmodel">${esc(r.rack_model||'')}${r.rack_u?' · '+r.rack_u+'U':''}</span></td>
        <td class="loc">${esc(h2.offering)} / ${esc(h2.region)} / ${esc(h2.zone)}</td>
        <td><select class="rt" data-file="${esc(fileOf(r))}" data-cur="${esc(cur)}" style="border:1px solid ${amber?'#fcd34d':'#cbd5e1'};background:${amber?'#fffbeb':'#fff'};color:${amber?'#b45309':colorOf(cur)}">${sel}</select></td>
        <td><div class="acts"><a class="actlink place" href="/place?path=${encodeURIComponent(placePath)}" title="이 존 배치 화면">🗺 배치</a>
          <button class="actlink" data-clone="${esc(fileOf(r))}" data-id="${esc(r.rack_id)}">⧉ 복제</button></div></td></tr>`;
    }
    h+=`</tbody></table></div></div>`;
  }
  if(!ordered.length) h=`<div class="empty">랙이 없습니다 — <b>＋ 랙 추가</b>로 카탈로그에서 담으세요.</div>`;
  document.getElementById('body').innerHTML=h;
}

// reclassify (move) on select change
document.getElementById('body').addEventListener('change',async e=>{
  const s=e.target.closest('select.rt'); if(!s) return;
  const file=s.dataset.file, cur=s.dataset.cur, next=s.value;
  if(next===cur) return;
  s.disabled=true;
  try{
    const r=await fetch('/api/rack/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source_path:file,rack_type:next})});
    if(!r.ok){ const d=await r.json().catch(()=>null); throw new Error((d&&d.detail&&(typeof d.detail==='string'?d.detail:JSON.stringify(d.detail)))||('HTTP '+r.status)); }
    toast('이동: → '+labelOf(next));
    await load(true);
  }catch(err){ toast('이동 실패: '+err.message); s.value=cur; s.disabled=false; }
});
// clone
document.getElementById('body').addEventListener('click',async e=>{
  const b=e.target.closest('[data-clone]'); if(!b) return;
  const nid=prompt('복제본 랙 ID (배치 그대로 복사)',''); if(nid==null) return; const rack=nid.trim(); if(!rack) return;
  try{
    const r=await fetch('/api/rack/clone',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source_path:b.dataset.clone,rack})});
    if(!r.ok){ const d=await r.json().catch(()=>null); throw new Error((d&&d.detail)||('HTTP '+r.status)); }
    toast('복제됨 → '+rack); await load(true);
  }catch(err){ toast('복제 실패: '+(err.message||err)); }
});

// ── add modal ─────────────────────────────────────────────────────────────
let amModel=null, amTimer=null;
const addModal=document.getElementById('addModal');
function zoneOptions(){
  const out=[];
  for(const o of HIER) for(const rg of (o.regions||[])) for(const z of (rg.zones||[]))
    out.push({path:`${o.offering} / ${rg.region} / ${z.zone}`,offering:o.offering,region:rg.region,zone:z.zone});
  return out;
}
document.getElementById('addBtn').addEventListener('click',()=>{
  amModel=null;
  const zs=zoneOptions();
  document.getElementById('amZone').innerHTML=zs.length?zs.map((z,i)=>`<option value="${i}">${esc(z.path)}</option>`).join(''):'<option value="">존 없음 — 기준정보에서 먼저 생성</option>';
  addModal._zones=zs;
  document.getElementById('amType').value='compute';
  document.getElementById('amRack').value=''; document.getElementById('amQ').value='';
  document.getElementById('amErr').textContent=''; document.getElementById('amRes').innerHTML='';
  addModal.classList.add('show'); searchModels('');
});
document.getElementById('amX').addEventListener('click',()=>addModal.classList.remove('show'));
document.getElementById('amCancel').addEventListener('click',()=>addModal.classList.remove('show'));
addModal.addEventListener('click',e=>{ if(e.target===addModal) addModal.classList.remove('show'); });
document.getElementById('amQ').addEventListener('input',e=>{ clearTimeout(amTimer); const q=e.target.value; amTimer=setTimeout(()=>searchModels(q),180); });
async function searchModels(q){
  const box=document.getElementById('amRes');
  try{
    const rows=await fetch('/api/catalog/search?kind=rack&limit=30&q='+encodeURIComponent(q)).then(r=>r.json());
    if(!rows.length){ box.innerHTML='<div class="it" style="color:#94a3b8;cursor:default">검색 결과가 없습니다.</div>'; return; }
    box.innerHTML=rows.map(r=>`<div class="it ${amModel&&amModel.slug===r.slug?'on':''}" data-slug="${esc(r.slug)}" data-u="${r.u_height||0}">
      <span class="ico">▣</span><span class="mt"><span class="m">${esc(r.manufacturer||'')} ${esc(r.model||r.slug)}</span><span class="s">${esc(r.slug)}</span></span><span class="u">${r.u_height||'?'}U</span></div>`).join('');
  }catch(e){ box.innerHTML='<div class="it" style="color:#94a3b8;cursor:default">모델 검색 불가</div>'; }
}
document.getElementById('amRes').addEventListener('click',e=>{
  const it=e.target.closest('.it[data-slug]'); if(!it) return;
  amModel={slug:it.dataset.slug,u_height:+it.dataset.u};
  [...document.querySelectorAll('#amRes .it')].forEach(x=>x.classList.toggle('on',x===it));
});
document.getElementById('amSave').addEventListener('click',async ()=>{
  const err=document.getElementById('amErr'); err.textContent='';
  const zs=addModal._zones||[]; const zi=document.getElementById('amZone').value;
  const z=zs[zi]; const rack=document.getElementById('amRack').value.trim(); const rack_type=document.getElementById('amType').value;
  if(!z){ err.textContent='존을 먼저 만들어 주세요'; return; }
  if(!rack){ err.textContent='랙 ID를 입력하세요'; return; }
  if(!amModel){ err.textContent='랙 모델을 선택하세요'; return; }
  try{
    const r=await fetch('/api/rack/new',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({offering:z.offering,region:z.region,zone:z.zone,rack_type,rack,rack_model:amModel.slug})});
    if(!r.ok){ const d=await r.json().catch(()=>null); throw new Error(r.status===409?'이미 존재하는 랙입니다':((d&&d.detail)||('HTTP '+r.status))); }
    addModal.classList.remove('show'); toast('담음: '+rack); await load(true);
  }catch(e2){ err.textContent=e2.message||String(e2); }
});

// ── load ──────────────────────────────────────────────────────────────────
async function load(silent){
  try{
    const [lay,hier]=await Promise.all([
      fetch('/api/layout?path=offerings').then(r=>r.ok?r.json():{racks:[]}),
      fetch('/api/hierarchy').then(r=>r.ok?r.json():[]),
    ]);
    RACKS=(lay.racks||[]).slice().sort((a,b)=>String(a.rack_id).localeCompare(String(b.rack_id)));
    HIER=Array.isArray(hier)?hier:[];
    render();
  }catch(e){ if(!silent) document.getElementById('body').innerHTML='<div class="empty">불러오기 실패: '+esc(e.message)+'</div>'; }
}
load(false);
</script>
</body></html>
