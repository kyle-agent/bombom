<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bombom — 투자 리포트</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
 :root{font-family:"Pretendard",system-ui,-apple-system,sans-serif}
 *{box-sizing:border-box}
 body{margin:0;background:#f4f6f9;color:#0f172a;-webkit-font-smoothing:antialiased}
 @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
 .sk{background:#e9edf2;background-image:linear-gradient(90deg,#e9edf2 0,#f3f6fa 200px,#e9edf2 400px);background-size:800px 100%;animation:shimmer 1.2s linear infinite;border-radius:8px}
 header.top{display:flex;gap:12px;align-items:center;padding:11px 22px;border-bottom:1px solid #e7ebf0;background:#fff;position:sticky;top:0;z-index:7;flex-wrap:wrap}
 header.top .logo{font-weight:800;font-size:17px;color:#2563eb;letter-spacing:-.2px}
 header.top .crumb{color:#64748b;font-size:13px}
 header.top nav{margin-left:auto;display:flex;gap:2px;align-items:center}
 header.top nav a{color:#475569;text-decoration:none;font-size:13px;padding:6px 11px;border-radius:7px}
 header.top nav a:hover{background:#f1f5f9}
 header.top nav a.on{color:#2563eb;background:#eff6ff;font-weight:700}

 .wrap{max-width:1040px;margin:0 auto;padding:18px 22px 60px}
 .controls{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
 .controls .lbl{color:#64748b;font-size:13px;margin-right:2px}
 .seg{display:inline-flex;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden;background:#fff}
 .seg button{border:0;background:#fff;padding:7px 14px;font-size:13px;cursor:pointer;color:#334155;border-right:1px solid #e2e8f0;font-family:inherit}
 .seg button:last-child{border-right:0}
 .seg button.on{background:#2563eb;color:#fff}
 .controls select{font-size:13px;padding:5px 8px;border:1px solid #cbd5e1;border-radius:7px;background:#fff;font-family:inherit;margin-left:4px}
 .sortsel{margin-left:auto;color:#64748b;font-size:13px}

 .totbar{display:flex;gap:20px;background:#0f172a;color:#e2e8f0;border-radius:12px;padding:14px 18px;margin-bottom:12px;flex-wrap:wrap}
 .totbar .t{display:flex;flex-direction:column}
 .totbar .t .n{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
 .totbar .t .l{color:#94a3b8;font-size:11px}

 .warn{display:flex;align-items:center;gap:10px;background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px}
 .warn .ic{width:20px;height:20px;border-radius:50%;background:#f59e0b;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex:0 0 auto}
 .warn a{margin-left:auto;color:#92400e;font-weight:700;text-decoration:none;white-space:nowrap}

 .dist{background:#fff;border:1px solid #e7ebf0;border-radius:12px;padding:14px 16px;margin-bottom:14px}
 .dist .h{font-size:12px;color:#64748b;margin-bottom:8px}
 .dist .stack{display:flex;height:14px;border-radius:7px;overflow:hidden;gap:2px}
 .dist .stack i{display:block;min-width:6px}
 .dist .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px}
 .dist .legend span.e{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#475569}
 .dist .legend span.dot{width:10px;height:10px;border-radius:3px}
 .dist .legend span.pct{color:#94a3b8}

 .card{background:#fff;border:1px solid #e7ebf0;border-radius:12px;overflow:hidden}
 table{width:100%;border-collapse:collapse}
 th,td{padding:11px 14px;border-bottom:1px solid #f1f5f9;font-size:14px;text-align:left}
 th{background:#f8fafc;color:#64748b;font-weight:600;font-size:12px}
 th.r,td.r{text-align:right;font-variant-numeric:tabular-nums}
 tbody tr:hover{background:#f8fafc}
 td .g{font-weight:600}
 .bar{height:6px;border-radius:3px;background:#dbeafe;margin-top:5px;overflow:hidden}
 .bar i{display:block;height:100%;border-radius:3px;background:#2563eb}
 tfoot td{font-weight:700;background:#f8fafc;border-top:2px solid #e2e8f0}
 .empty{padding:40px;text-align:center;color:#94a3b8}
</style>
</head>
<body>
<header class="top">
 <span class="logo">bombom</span><span class="crumb">— 투자 리포트</span>
 <nav>
  <a href="/">메인</a>
  <a href="/candidates">후보풀</a>
  <a href="/placed">배치 목록</a>
  <a href="/summary" class="on">투자 리포트</a>
  <a href="/manage">기준정보</a>
  <a href="/edit">랙관리</a>
 </nav>
</header>
<div class="wrap">
 <div class="controls">
   <span class="lbl">집계 단위</span>
   <div class="seg" id="seg">
     <button data-g="offering">오퍼링별</button>
     <button data-g="region">리전별</button>
     <button data-g="zone" class="on">존별</button>
     <button data-g="rack_type">랙타입별</button>
   </div>
   <span class="lbl" style="margin-left:14px">릴리즈</span>
   <select id="relFilter"><option value="">전체</option></select>
   <span class="sortsel">정렬
     <select id="sort">
       <option value="capex">투자비용 ↓</option>
       <option value="servers">서버 수 ↓</option>
       <option value="devices">전체 장비 ↓</option>
       <option value="racks">랙 수 ↓</option>
       <option value="label">이름순</option>
     </select>
   </span>
 </div>
 <div id="totbarwrap"></div>
 <div id="warnwrap"></div>
 <div id="bodywrap"></div>
</div>
<script>
const cur='₩';
function won(n){return cur+Number(n||0).toLocaleString();}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

let DATA=null, UNPRICED=0, group='zone', sort='capex';
const GLABEL={offering:'오퍼링',region:'리전',zone:'존',rack_type:'랙타입'};
const PAL=['#2563eb','#9333ea','#0ea5e9','#16a34a','#f59e0b','#be185d','#0d9488','#4338ca'];
const RT_COLOR={compute:'#2563eb',gpu:'#7c3aed',storage:'#9333ea',network:'#16a34a'};

function colorFor(label,i){
  if(group==='rack_type'){ const k=String(label||'').toLowerCase(); if(RT_COLOR[k]) return RT_COLOR[k]; }
  return PAL[i%PAL.length];
}

function skeleton(){
  document.getElementById('bodywrap').innerHTML=
    '<div class="sk" style="height:44px;margin-bottom:14px"></div>'+
    '<div class="sk" style="height:260px"></div>';
}

function renderTotbar(){
  const t=(DATA&&DATA.totals)||{capex:0,servers:0,devices:0,racks:0};
  document.getElementById('totbarwrap').innerHTML=`
    <div class="totbar">
      <div class="t"><span class="n">${won(t.capex)}</span><span class="l">총 투자비용(CAPEX)</span></div>
      <div class="t"><span class="n">${Number(t.servers||0).toLocaleString()}</span><span class="l">서버 대수</span></div>
      <div class="t"><span class="n">${Number(t.devices||0).toLocaleString()}</span><span class="l">전체 장비</span></div>
      <div class="t"><span class="n">${Number(t.racks||0).toLocaleString()}</span><span class="l">랙</span></div>
    </div>`;
}

function renderWarn(){
  const w=document.getElementById('warnwrap');
  if(!UNPRICED){ w.innerHTML=''; return; }
  w.innerHTML=`
    <div class="warn">
      <span class="ic">!</span>
      <span><b>미가격 배치 ${UNPRICED}건</b>이 합계에서 빠져 있어 투자비용이 과소 계상됩니다.</span>
      <a href="/candidates">가격 입력 →</a>
    </div>`;
}

function render(){
  if(!DATA) return;
  renderTotbar();
  const t=DATA.totals;
  let rows=(DATA.groups[group]||[]).slice();
  rows.sort((a,b)=> sort==='label' ? String(a.label).localeCompare(String(b.label)) : (b[sort]-a[sort]));

  if(!rows.length){ document.getElementById('bodywrap').innerHTML='<div class="card"><div class="empty">데이터가 없습니다.</div></div>'; return; }

  const totCap=rows.reduce((s,r)=>s+(r.capex||0),0);
  const maxCap=Math.max(1,...rows.map(r=>r.capex||0));
  const colored=rows.map((r,i)=>({r,color:colorFor(r.label,i)}));

  const stack=colored.map(({r,color})=>{
    const pct=totCap?Math.round(r.capex/totCap*100):0;
    return `<i title="${esc(r.label)}" style="width:${totCap?(r.capex/totCap*100):0}%;background:${color}"></i>`;
  }).join('');
  const legend=colored.map(({r,color})=>{
    const pct=totCap?Math.round(r.capex/totCap*100):0;
    return `<span class="e"><span class="dot" style="background:${color}"></span>${esc(r.label)} <span class="pct">${pct}%</span></span>`;
  }).join('');

  const body=colored.map(({r,color})=>`<tr>
    <td><span class="g">${esc(r.label)}</span><div class="bar"><i style="width:${Math.round((r.capex||0)/maxCap*100)}%;background:${color}"></i></div></td>
    <td class="r">${won(r.capex)}</td>
    <td class="r">${Number(r.servers||0).toLocaleString()}</td>
    <td class="r">${Number(r.devices||0).toLocaleString()}</td>
    <td class="r">${Number(r.racks||0).toLocaleString()}</td></tr>`).join('');

  document.getElementById('bodywrap').innerHTML=`
    <div class="dist">
      <div class="h">${esc(GLABEL[group])}별 투자 분포</div>
      <div class="stack">${stack}</div>
      <div class="legend">${legend}</div>
    </div>
    <div class="card">
      <table>
        <thead><tr>
          <th>${esc(GLABEL[group])}</th><th class="r">투자비용</th><th class="r">서버</th>
          <th class="r">전체 장비</th><th class="r">랙</th>
        </tr></thead>
        <tbody>${body}</tbody>
        <tfoot><tr>
          <td>합계</td><td class="r">${won(t.capex)}</td>
          <td class="r">${Number(t.servers||0).toLocaleString()}</td>
          <td class="r">${Number(t.devices||0).toLocaleString()}</td>
          <td class="r">${Number(t.racks||0).toLocaleString()}</td>
        </tr></tfoot>
      </table>
    </div>`;
}

document.getElementById('seg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  group=b.dataset.g;
  [...document.querySelectorAll('#seg button')].forEach(x=>x.classList.toggle('on',x===b));
  render();
});
document.getElementById('sort').addEventListener('change',e=>{ sort=e.target.value; render(); });

function loadHealth(release){
  const u='/api/health?path=offerings';
  fetch(u).then(r=>r.json()).then(d=>{
    UNPRICED=(d&&d.counts&&typeof d.counts.unpriced==='number')?d.counts.unpriced:0;
    renderWarn();
  }).catch(()=>{ UNPRICED=0; renderWarn(); });
}

let relsLoaded=false;
function load(release){
  const u='/api/overview?path=offerings'+(release?'&release='+encodeURIComponent(release):'');
  renderTotbar();
  skeleton();
  fetch(u).then(r=>r.json()).then(d=>{
    DATA=d;
    if(!relsLoaded){ relsLoaded=true; const sel=document.getElementById('relFilter');
      (d.releases||[]).forEach(x=>{ const o=document.createElement('option'); o.value=o.textContent=x; sel.appendChild(o); });
      const dr=document.createElement('option'); dr.value='DRAFT'; dr.textContent='미태그(작업본)'; sel.appendChild(dr);
    }
    render();
  }).catch(e=>{ document.getElementById('bodywrap').innerHTML='<div class="card"><div class="empty">불러오기 실패: '+esc(e.message)+'</div></div>'; });
}
document.getElementById('relFilter').addEventListener('change',e=>load(e.target.value));
load('');
loadHealth('');
</script></body></html>
