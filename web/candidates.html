<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bombom — 후보풀</title>
<style>
 :root{--accent:#2563eb;--line:#e7ebf0;--muted:#64748b;font-family:system-ui,-apple-system,sans-serif}
 *{box-sizing:border-box}
 body{margin:0;background:#f4f6f9;color:#0f172a}
 header{display:flex;gap:10px;align-items:center;padding:11px 18px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:6}
 .logo{font-weight:800;font-size:16px;color:var(--accent)}
 .crumb{color:var(--muted);font-size:13px}
 nav{margin-left:auto;display:flex;gap:2px}
 nav a{color:#475569;text-decoration:none;font-size:13px;padding:5px 9px;border-radius:6px}
 .wrap{max-width:1080px;margin:20px auto;padding:0 18px 50px}
 .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
 .toolbar .t{font-size:14px;color:var(--muted)}
 .btn{font-size:13px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;padding:7px 12px;cursor:pointer}
 .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
 .btn.primary:hover{background:#1d4ed8}
 .spacer{margin-left:auto}
 .cat{margin-bottom:18px}
 .cat .ch{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;margin:0 0 8px}
 .cat .ch .dot{width:11px;height:11px;border-radius:3px}
 .cat .ch .cnt{color:var(--muted);font-weight:400;font-size:12px}
 table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
 th,td{padding:9px 12px;border-bottom:1px solid #f4f6f9;font-size:13px;text-align:left;vertical-align:middle}
 th{background:#f8fafc;color:var(--muted);font-weight:600;font-size:11px}
 tr:last-child td{border-bottom:0}
 td.dev b{font-weight:700}td.dev .slug{color:#94a3b8;font-size:11px;margin-left:6px}
 .pricewrap{display:inline-flex;align-items:center;gap:4px;border:1px solid #cbd5e1;border-radius:7px;padding:2px 8px;background:#fff}
 .pricewrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
 .pricewrap .w{color:#94a3b8}
 .pricewrap input{border:0;outline:0;width:120px;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;background:transparent}
 td.price .none{color:#d97706;font-size:11px;margin-left:6px}
 input.note,input.meta{border:1px solid #e2e8f0;border-radius:7px;padding:5px 8px;font-size:12px;width:100%}
 input.note:focus,input.meta:focus{border-color:var(--accent);outline:0}
 .req::after{content:" *";color:#dc2626}
 td.rm{text-align:right}
 .delbtn{border:none;background:none;color:#94a3b8;cursor:pointer;font-size:12px;padding:3px 6px;border-radius:6px}
 .delbtn:hover{color:#dc2626;background:#fef2f2}
 .empty{padding:50px;text-align:center;color:#94a3b8}
 .modal{position:fixed;inset:0;background:rgba(15,23,42,.35);display:none;align-items:flex-start;justify-content:center;z-index:30}
 .modal.on{display:flex}
 .modal .box{background:#fff;border-radius:12px;margin-top:60px;width:560px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(15,23,42,.25)}
 .modal .mh{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
 .modal .mh b{font-size:14px}.modal .mh .x{margin-left:auto;cursor:pointer;color:#94a3b8;font-size:20px}
 .modal .controls{padding:10px 16px 4px}.modal input.s{width:100%;padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px}
 .modal .mhint{padding:2px 16px 8px;color:var(--muted);font-size:12px}
 .modal .res{overflow:auto;padding:6px 12px 14px}
 .mrow{display:flex;align-items:center;gap:9px;padding:8px;border:1px solid var(--line);border-radius:9px;margin:6px 0}
 .mrow .dot{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
 .mrow .info{flex:1;min-width:0}.mrow .info .n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .mrow .info .m{font-size:11px;color:var(--muted)}
 .mrow .add{background:var(--accent);color:#fff;border:0;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer}
 .mrow .add.in{background:#e2e8f0;color:#64748b;cursor:default}
 #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:13px;padding:8px 14px;border-radius:8px;opacity:0;transition:.2s;pointer-events:none;z-index:40}
 #toast.on{opacity:.96}
</style></head>
<body>
<header>
 <span class="logo">bombom</span><span class="crumb">— 후보풀 (1차 후보)</span>
 <nav class="topnav"><a href="/">메인</a><a href="/candidates">후보풀</a><a href="/placed">배치 목록</a><a href="/summary">투자 리포트</a><a href="/manage">기준정보</a><a href="/edit">랙관리</a></nav>
</header>
<div class="wrap">
 <div class="toolbar">
   <span class="t" id="summary">불러오는 중…</span>
   <span class="spacer"></span>
   <button class="btn primary" id="addBtn">＋ 후보 추가</button>
 </div>
 <div id="list"><div class="empty">불러오는 중…</div></div>
</div>
<div class="modal" id="modal"><div class="box">
  <div class="mh"><b>＋ 후보 추가 (카탈로그에서 선택)</b><span class="x" id="mClose">×</span></div>
  <div class="controls"><input class="s" id="mSearch" placeholder="제조사 / 모델 검색…"></div>
  <div class="mhint">검색해서 <b>＋추가</b>하면 후보풀에 반영됩니다. 가격·비고는 목록에서 바로 입력하세요.</div>
  <div class="res" id="mRes"><div class="empty">검색어를 입력하세요.</div></div>
</div></div>
<div id="toast"></div>
<script>
const CAT={server:"#2563eb",network:"#16a34a",storage:"#9333ea",other:"#64748b"};
const CATLABEL={server:"서버",network:"네트워크",storage:"스토리지",other:"기타"};
const ORDER=["server","network","storage","other"];
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('on'),2000);}

let POOL=[], FIELDS=[];
const myFields=()=>FIELDS.filter(f=>f.applies_to==='candidate');

async function apiPut(slug, body){
  const r=await fetch('/api/candidates/'+encodeURIComponent(slug),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const d=await r.json().catch(()=>null);throw new Error((d&&d.detail)||('HTTP '+r.status));}
  return r.json();
}
function render(){
  const byCat={}; POOL.forEach(c=>{(byCat[c.category]=byCat[c.category]||[]).push(c);});
  document.getElementById('summary').textContent=`후보 ${POOL.length}종 · 미가격 ${POOL.filter(c=>!c.priced).length}`;
  const cats=ORDER.filter(c=>byCat[c]);
  if(!cats.length){ document.getElementById('list').innerHTML='<div class="empty">후보가 없습니다 — <b>＋ 후보 추가</b>로 카탈로그에서 선택하세요.</div>'; return; }
  const fcols=myFields();
  document.getElementById('list').innerHTML=cats.map(cat=>{
    const rows=byCat[cat].sort((a,b)=>(a.model||a.slug).localeCompare(b.model||b.slug)).map(c=>{
      const price=`<div class="pricewrap"><span class="w">₩</span><input type="number" min="0" step="100000" value="${c.unit_cost!=null?c.unit_cost:''}" data-slug="${esc(c.slug)}" data-k="price" placeholder="0"></div>${c.priced?'':'<span class="none">미입력</span>'}`;
      const metas=fcols.map(f=>`<td><input class="meta" value="${esc((c.meta&&c.meta[f.key])!=null?c.meta[f.key]:'')}" data-slug="${esc(c.slug)}" data-k="meta" data-field="${esc(f.key)}" placeholder="${esc(f.label)}"></td>`).join('');
      return `<tr><td class="dev"><b>${esc(c.model||c.slug)}</b><span class="slug">${esc(c.slug)}</span></td>
        <td class="price">${price}</td>${metas}
        <td><input class="note" value="${esc(c.note||'')}" data-slug="${esc(c.slug)}" data-k="note" placeholder="비고"></td>
        <td class="rm"><button class="delbtn" data-del="${esc(c.slug)}">✕ 제거</button></td></tr>`;
    }).join('');
    return `<div class="cat"><div class="ch"><span class="dot" style="background:${CAT[cat]||CAT.other}"></span>${CATLABEL[cat]||cat}<span class="cnt">· ${byCat[cat].length}종</span></div>
      <table><thead><tr><th>장비</th><th>단가</th>${fcols.map(f=>`<th class="${f.required?'req':''}">${esc(f.label)}</th>`).join('')}<th>비고</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }).join('');
  wire();
}
function wire(){
  document.querySelectorAll('input[data-k="price"]').forEach(el=>el.addEventListener('change',async()=>{
    const v=el.value.trim(); if(v==='')return;
    try{ await apiPut(el.dataset.slug,{unit_cost:Math.max(0,Math.round(+v))}); const c=POOL.find(x=>x.slug===el.dataset.slug); if(c){c.unit_cost=+v;c.priced=true;} toast('가격 저장: '+el.dataset.slug); }
    catch(e){ toast('저장 실패: '+e.message); }
  }));
  document.querySelectorAll('input[data-k="note"]').forEach(el=>el.addEventListener('change',async()=>{
    try{ await apiPut(el.dataset.slug,{note:el.value}); toast('비고 저장됨'); }catch(e){ toast('저장 실패: '+e.message); }
  }));
  document.querySelectorAll('input[data-k="meta"]').forEach(el=>el.addEventListener('change',async()=>{
    const c=POOL.find(x=>x.slug===el.dataset.slug); const meta=Object.assign({},c&&c.meta); meta[el.dataset.field]=el.value;
    try{ await apiPut(el.dataset.slug,{meta}); if(c)c.meta=meta; toast('항목 저장됨'); }catch(e){ toast('저장 실패: '+e.message); }
  }));
  document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',async()=>{
    if(!confirm(el.dataset.del+' 를 후보풀에서 제거할까요?'))return;
    const r=await fetch('/api/candidates/'+encodeURIComponent(el.dataset.del),{method:'DELETE'});
    if(r.ok){ POOL=POOL.filter(c=>c.slug!==el.dataset.del); render(); toast('제거됨'); } else toast('제거 실패');
  }));
}

const modal=document.getElementById('modal');
document.getElementById('addBtn').onclick=()=>{ modal.classList.add('on'); document.getElementById('mSearch').focus(); search(); };
document.getElementById('mClose').onclick=()=>modal.classList.remove('on');
modal.addEventListener('click',e=>{ if(e.target===modal)modal.classList.remove('on'); });
let st=null;
document.getElementById('mSearch').addEventListener('input',()=>{ clearTimeout(st); st=setTimeout(search,200); });
function search(){
  const q=document.getElementById('mSearch').value.trim();
  const box=document.getElementById('mRes'); box.innerHTML='<div class="empty">불러오는 중…</div>';
  fetch('/api/catalog/search?kind=device&limit=50&q='+encodeURIComponent(q)).then(r=>r.json()).then(rows=>{
    if(!rows.length){ box.innerHTML='<div class="empty">검색 결과가 없습니다.</div>'; return; }
    const have=new Set(POOL.map(c=>c.slug));
    box.innerHTML=rows.map(r=>{
      const cat=r.category||'other', inpool=have.has(r.slug);
      return `<div class="mrow"><span class="dot" style="background:${CAT[cat]||CAT.other}"></span>
        <span class="info"><span class="n">${esc(r.model||r.slug)}</span><span class="m">${esc(r.manufacturer||'')} · ${esc(cat)} · ${esc(r.slug)}</span></span>
        <button class="add ${inpool?'in':''}" data-slug="${esc(r.slug)}" ${inpool?'disabled':''}>${inpool?'담김':'＋ 추가'}</button></div>`;
    }).join('');
    box.querySelectorAll('.add:not(.in)').forEach(btn=>btn.addEventListener('click',async()=>{
      const r=await fetch('/api/candidates',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:btn.dataset.slug})});
      if(r.ok){ const j=await r.json(); POOL.push(j.candidate||{slug:btn.dataset.slug,category:'other'}); btn.textContent='담김'; btn.classList.add('in'); btn.disabled=true; render(); toast('후보풀에 추가: '+btn.dataset.slug); }
      else { const d=await r.json().catch(()=>null); toast('추가 실패: '+((d&&d.detail)||r.status)); }
    }));
  }).catch(e=>{ box.innerHTML='<div class="empty">검색 실패: '+esc(e.message)+'</div>'; });
}

Promise.all([
  fetch('/api/candidates').then(r=>r.json()),
  fetch('/api/candidate-fields').then(r=>r.json()).catch(()=>[]),
]).then(([pool,fields])=>{ POOL=pool||[]; FIELDS=fields||[]; render(); })
  .catch(e=>{ document.getElementById('list').innerHTML='<div class="empty">불러오기 실패: '+esc(e.message)+'</div>'; });
</script>
<style id="cxbar">
header{background:#fff!important;color:#0f172a!important;border-bottom:1px solid #e7ebf0!important}
header .logo,header .ab-logo{color:#2563eb!important}
header .crumb{color:#64748b!important}
header nav a,header .topnav a,header .links a{color:#475569!important;background:transparent!important;border:1px solid transparent!important;font-weight:500!important;border-radius:7px!important;padding:5px 9px!important;text-decoration:none!important}
header nav a:hover,header .topnav a:hover,header .links a:hover{background:#f1f5f9!important;color:#0f172a!important}
header nav a.on,header .topnav a.on,header .links a.on{background:#eff6ff!important;color:#2563eb!important;font-weight:700!important}
</style>
<script>addEventListener('DOMContentLoaded',function(){function st(h){h=(h||'').split('?')[0].split('#')[0].replace(/^.*\//,'').replace(/\.html$/,'');return h||'index';}var cur=st(location.pathname);if(cur==='home')cur='index';document.querySelectorAll('header a[href]').forEach(function(a){if(a.classList.contains('logo')||a.classList.contains('ab-logo'))return;var s=st(a.getAttribute('href'));if(s==='home')s='index';if(s===cur)a.classList.add('on');});});</script>
</body></html>
