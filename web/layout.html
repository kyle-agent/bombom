<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bombom — 랙구성도</title>
<style>
  :root{font-family:system-ui,-apple-system,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;background:#f8fafc;color:#0f172a;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{display:flex;gap:10px;align-items:center;padding:9px 14px;border-bottom:1px solid #e2e8f0;background:#fff;flex:0 0 auto}
  .logo{font-weight:700;font-size:15px;color:#2563eb}
  .crumb{color:#64748b;font-size:13px}
  #pathlbl{color:#334155;font-size:12px;background:#f1f5f9;border:1px solid #cbd5e1;border-radius:6px;padding:3px 8px}
  nav.topnav{margin-left:auto;display:flex;gap:2px}
  nav.topnav a{color:#475569;text-decoration:none;font-size:13px;padding:4px 8px;border-radius:6px}
  nav.topnav a:hover{background:#f1f5f9}
  .toolbar{display:flex;gap:6px;align-items:center}
  .toolbar button,.toolbar a.btn{background:#fff;color:#0f172a;border:1px solid #cbd5e1;border-radius:6px;
     padding:5px 10px;font-size:13px;cursor:pointer;text-decoration:none}
  .toolbar button:hover,.toolbar a.btn:hover{background:#f1f5f9}
  #zlabel{font-variant-numeric:tabular-nums;color:#64748b;font-size:12px;min-width:46px;text-align:right}
  .main{flex:1 1 auto;display:flex;min-height:0}
  #viewport{position:relative;flex:1 1 auto;overflow:hidden;cursor:grab;
     background:linear-gradient(#e8edf3 1px,transparent 1px) 0 0/24px 24px,
       linear-gradient(90deg,#e8edf3 1px,transparent 1px) 0 0/24px 24px,#fbfdff}
  #viewport.grabbing{cursor:grabbing}
  #scene{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;display:flex;gap:46px;padding:40px;align-items:flex-start}
  figure.rack{margin:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 8px 8px;box-shadow:0 1px 3px rgba(15,23,42,.06)}
  figcaption{font-size:12px;color:#334155;text-align:center;margin-bottom:6px;white-space:nowrap}
  figcaption small{color:#94a3b8}
  .dev{cursor:pointer}
  .dev:hover rect{stroke:#d97706;stroke-width:2}
  .dev.sel rect{stroke:#d97706;stroke-width:3}
  /* detail panel */
  aside{flex:0 0 auto;width:0;overflow:hidden;border-left:1px solid #e2e8f0;background:#fff;transition:width .12s}
  aside.open{width:280px;padding:14px}
  aside h4{margin:0 0 10px;font-size:14px}
  aside .row{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 0;border-bottom:1px solid #f1f5f9}
  aside .k{color:#64748b}
  aside .v{color:#0f172a;text-align:right}
  aside .close{float:right;cursor:pointer;color:#94a3b8;font-size:18px;line-height:1}
  .badge{display:inline-block;border-radius:5px;padding:1px 7px;font-size:12px;color:#fff}
  .empty,.err{padding:40px;color:#64748b}
  .err{color:#dc2626}
  .legend{display:flex;gap:12px;align-items:center;font-size:12px;color:#64748b;padding:6px 14px;border-top:1px solid #e2e8f0;background:#fff;flex:0 0 auto}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:4px;vertical-align:-1px}
</style></head>
<body>
<header>
  <span class="logo">bombom</span><span class="crumb">— 랙구성도</span>
  <span id="pathlbl">—</span>
  <div class="toolbar">
    <span id="zlabel">100%</span>
    <button onclick="zoomBy(1/1.2)" title="축소">−</button>
    <button onclick="zoomBy(1.2)" title="확대">+</button>
    <button onclick="fit()">맞춤</button>
    <button onclick="reset()">100%</button>
    <a class="btn" id="dl" href="#" title="이 범위를 draw.io로 내려받기">⬇ draw.io</a>
  </div>
  <nav class="topnav">
    <a id="back" href="/">뷰어</a><a href="/edit">에디터</a><a href="/manage">기준정보</a>
    <a href="/dashboard">현황</a>
  </nav>
</header>
<div class="main">
  <div id="viewport"><div id="scene"></div></div>
  <aside id="panel">
    <span class="close" onclick="closePanel()">×</span>
    <h4 id="p_model">장비</h4>
    <div class="row"><span class="k">슬러그</span><span class="v" id="p_slug"></span></div>
    <div class="row"><span class="k">위치</span><span class="v" id="p_pos"></span></div>
    <div class="row"><span class="k">높이</span><span class="v" id="p_span"></span></div>
    <div class="row"><span class="k">릴리즈</span><span class="v" id="p_rel"></span></div>
    <div class="row"><span class="k">카테고리</span><span class="v"><span class="badge" id="p_cat"></span></span></div>
  </aside>
</div>
<div class="legend">
  <span><i style="background:#2563eb"></i>server</span>
  <span><i style="background:#16a34a"></i>network</span>
  <span><i style="background:#9333ea"></i>storage</span>
  <span><i style="background:#64748b"></i>other</span>
  <span style="margin-left:auto">휠=줌(커서 기준) · 드래그=이동 · 더블클릭=확대 · 장비 클릭=상세</span>
</div>
<script>
const CAT_FILL={server:"#2563eb",network:"#16a34a",storage:"#9333ea",other:"#64748b"};
const qs=new URLSearchParams(location.search);
const PATH=qs.get('path')||'offerings';
const REL=qs.get('release')||'';
const scene=document.getElementById('scene'), vp=document.getElementById('viewport'), zl=document.getElementById('zlabel');
document.getElementById('pathlbl').textContent=PATH;
document.getElementById('back').href='/?path='+encodeURIComponent(PATH);
document.getElementById('dl').href='/api/rack/elevation.drawio?path='+encodeURIComponent(PATH)+(REL?'&release='+encodeURIComponent(REL):'')+'&download=1';

// ── pan / zoom ────────────────────────────────────────────────────────────
let scale=1, tx=0, ty=0;
function apply(){scene.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; zl.textContent=Math.round(scale*100)+'%';}
function zoomAt(cx,cy,f){const ns=Math.min(8,Math.max(.1,scale*f));
  tx=cx-(cx-tx)*(ns/scale); ty=cy-(cy-ty)*(ns/scale); scale=ns; apply();}
function zoomBy(f){const r=vp.getBoundingClientRect(); zoomAt(r.width/2,r.height/2,f);}
function reset(){scale=1;tx=0;ty=0;apply();}
function fit(){const r=vp.getBoundingClientRect(), b=scene.getBoundingClientRect();
  if(!b.width) return; const cw=b.width/scale, ch=b.height/scale;
  scale=Math.min((r.width-40)/cw,(r.height-40)/ch,4); tx=Math.max(20,(r.width-cw*scale)/2); ty=20; apply();}
vp.addEventListener('wheel',e=>{e.preventDefault();const r=vp.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top, e.deltaY<0?1.12:1/1.12);},{passive:false});
let drag=null, moved=false;
vp.addEventListener('pointerdown',e=>{drag={x:e.clientX-tx,y:e.clientY-ty,sx:e.clientX,sy:e.clientY};moved=false;vp.classList.add('grabbing');vp.setPointerCapture(e.pointerId);});
vp.addEventListener('pointermove',e=>{if(!drag)return;
  if(Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy)>4) moved=true;  // ignore micro-jitter so clicks still register
  tx=e.clientX-drag.x;ty=e.clientY-drag.y;apply();});
vp.addEventListener('pointerup',e=>{
  const wasTap = drag && !moved;
  drag=null;vp.classList.remove('grabbing');
  // pointer capture suppresses the inner element's click event, so resolve the tap here
  if(wasTap){ const el=document.elementFromPoint(e.clientX,e.clientY); showDetail(el&&el.closest&&el.closest('.dev')); }
});
vp.addEventListener('dblclick',e=>{const r=vp.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,1.5);});

// ── click-detail ──────────────────────────────────────────────────────────
let selected=null;
function closePanel(){document.getElementById('panel').classList.remove('open'); if(selected){selected.classList.remove('sel');selected=null;}}
function showDetail(g){
  if(!g) return;
  if(selected) selected.classList.remove('sel');
  selected=g; g.classList.add('sel');
  const d=g.dataset, cat=d.cat||'other';
  document.getElementById('p_model').textContent=d.model||'장비';
  document.getElementById('p_slug').textContent=d.device||'';
  document.getElementById('p_pos').textContent='U'+d.pos;
  document.getElementById('p_span').textContent=d.span+'U';
  document.getElementById('p_rel').textContent=d.rel||'—';
  const cb=document.getElementById('p_cat'); cb.textContent=cat; cb.style.background=CAT_FILL[cat]||CAT_FILL.other;
  document.getElementById('panel').classList.add('open');
}

// ── load ──────────────────────────────────────────────────────────────────
fetch('/api/layout?path='+encodeURIComponent(PATH)+(REL?'&release='+encodeURIComponent(REL):''))
  .then(r=>{ if(!r.ok) throw new Error(r.status===404?'이 경로에 랙이 없습니다.':'불러오기 실패 ('+r.status+')'); return r.json(); })
  .then(d=>{
    if(!d.racks.length){ scene.innerHTML='<div class="empty">이 경로에 랙이 없습니다.</div>'; return; }
    scene.innerHTML=d.racks.map(rk=>{
      const h=rk.hierarchy||{};
      const sub=[h.zone,h.rack_type].filter(Boolean).join(' · ');
      return `<figure class="rack"><figcaption>${rk.rack_id} <small>${rk.rack_model} · ${rk.rack_u}U`
           + (sub?` · ${sub}`:'')+`</small></figcaption>${rk.svg}</figure>`;
    }).join('');
    requestAnimationFrame(fit);
  })
  .catch(err=>{ scene.innerHTML='<div class="err">'+err.message+'</div>'; });
apply();
</script></body></html>
