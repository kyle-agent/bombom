<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bombom — 존 상세</title>
<style>
 :root{font-family:system-ui,-apple-system,sans-serif}
 *{box-sizing:border-box}
 html,body{height:100%}
 body{margin:0;background:#f8fafc;color:#0f172a;display:flex;flex-direction:column;overflow:hidden}
 header{display:flex;gap:10px;align-items:center;padding:10px 16px;border-bottom:1px solid #e2e8f0;background:#fff;flex:0 0 auto}
 .logo{font-weight:700;font-size:15px;color:#2563eb}
 .crumb{color:#334155;font-size:13px}
 .crumb b{color:#0f172a}
 nav{margin-left:auto;display:flex;gap:2px}
 nav a{color:#475569;text-decoration:none;font-size:13px;padding:5px 9px;border-radius:6px}
 nav a:hover{background:#f1f5f9}
 .summary{display:flex;gap:18px;padding:9px 16px;border-bottom:1px solid #e2e8f0;background:#fff;flex:0 0 auto;flex-wrap:wrap}
 .summary .s{display:flex;flex-direction:column}
 .summary .s .n{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
 .summary .s .l{color:#94a3b8;font-size:11px}
 .main{flex:1 1 auto;display:flex;min-height:0}
 /* device list */
 aside{flex:0 0 380px;border-right:1px solid #e2e8f0;background:#fff;display:flex;flex-direction:column;min-height:0}
 aside .h{padding:9px 14px;font-weight:600;font-size:13px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center}
 aside .h .cnt{color:#94a3b8;font-weight:400}
 .list{overflow:auto;flex:1 1 auto}
 table{width:100%;border-collapse:collapse;font-size:12px}
 th,td{text-align:left;padding:6px 14px;border-bottom:1px solid #f1f5f9;white-space:nowrap}
 th{position:sticky;top:0;background:#f8fafc;color:#64748b;font-weight:600;z-index:1}
 td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
 .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:0}
 /* elevations */
 #viewport{position:relative;flex:1 1 auto;overflow:hidden;cursor:grab;
   background:linear-gradient(#e8edf3 1px,transparent 1px) 0 0/24px 24px,
     linear-gradient(90deg,#e8edf3 1px,transparent 1px) 0 0/24px 24px,#fbfdff}
 #viewport.grabbing{cursor:grabbing}
 .vtools{position:absolute;right:12px;top:12px;z-index:3;display:flex;gap:6px}
 .vtools button{background:#fff;border:1px solid #cbd5e1;border-radius:6px;padding:4px 9px;font-size:13px;cursor:pointer}
 .vtools button:hover{background:#f1f5f9}
 #zl{align-self:center;color:#64748b;font-size:12px;font-variant-numeric:tabular-nums;min-width:42px;text-align:right}
 #scene{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;display:flex;gap:40px;padding:36px;align-items:flex-start}
 figure.rack{margin:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 8px 8px;box-shadow:0 1px 3px rgba(15,23,42,.06)}
 figcaption{font-size:12px;color:#334155;text-align:center;margin-bottom:6px;white-space:nowrap}
 figcaption small{color:#94a3b8}
 .hint{position:absolute;left:12px;bottom:10px;color:#94a3b8;font-size:12px;z-index:3}
 .empty{padding:40px;color:#94a3b8}
</style></head>
<body>
<header>
 <span class="logo">bombom</span>
 <span class="crumb" id="crumb">— 존</span>
 <nav><a href="/home">← 메인</a><a href="/summary">투자 리포트</a><a id="dash" href="/dashboard">현황</a></nav>
</header>
<div class="summary" id="summary"></div>
<div class="main">
 <aside>
   <div class="h">장비 리스트 <span class="cnt" id="devcnt"></span></div>
   <div class="list"><table id="devtable"><thead><tr>
     <th>랙</th><th>장비</th><th>카테고리</th><th>릴리즈</th><th class="r">수량</th><th class="r">소계</th>
   </tr></thead><tbody id="devbody"></tbody></table></div>
 </aside>
 <div id="viewport">
   <div class="vtools"><span id="zl">100%</span>
     <button onclick="zoomBy(1/1.2)">−</button><button onclick="zoomBy(1.2)">+</button>
     <button onclick="fit()">맞춤</button></div>
   <div id="scene"></div>
   <div class="hint">휠=확대/축소(커서 기준) · 드래그=이동</div>
 </div>
</div>
<script>
const CAT={server:"#2563eb",network:"#16a34a",storage:"#9333ea",other:"#64748b"};
const PATH=new URLSearchParams(location.search).get('path')||'offerings';
const cur='₩';
function won(n){return cur+Number(n||0).toLocaleString();}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
document.getElementById('dash').href='/dashboard?path='+encodeURIComponent(PATH);

// ── pan / zoom (wheel) ──────────────────────────────────────────────
const vp=document.getElementById('viewport'), scene=document.getElementById('scene'), zl=document.getElementById('zl');
let scale=1,tx=0,ty=0;
function apply(){scene.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; zl.textContent=Math.round(scale*100)+'%';}
function zoomAt(cx,cy,f){const ns=Math.min(8,Math.max(.1,scale*f)); tx=cx-(cx-tx)*(ns/scale); ty=cy-(cy-ty)*(ns/scale); scale=ns; apply();}
function zoomBy(f){const r=vp.getBoundingClientRect(); zoomAt(r.width/2,r.height/2,f);}
function fit(){const r=vp.getBoundingClientRect(), b=scene.getBoundingClientRect(); if(!b.width)return;
  const cw=b.width/scale, ch=b.height/scale; scale=Math.min((r.width-36)/cw,(r.height-36)/ch,4);
  tx=Math.max(18,(r.width-cw*scale)/2); ty=18; apply();}
vp.addEventListener('wheel',e=>{e.preventDefault();const r=vp.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top, e.deltaY<0?1.12:1/1.12);},{passive:false});
let drag=null;
vp.addEventListener('pointerdown',e=>{drag={x:e.clientX-tx,y:e.clientY-ty};vp.classList.add('grabbing');vp.setPointerCapture(e.pointerId);});
vp.addEventListener('pointermove',e=>{if(!drag)return;tx=e.clientX-drag.x;ty=e.clientY-drag.y;apply();});
vp.addEventListener('pointerup',()=>{drag=null;vp.classList.remove('grabbing');});
apply();

// ── load ────────────────────────────────────────────────────────────
Promise.all([
  fetch('/api/overview?path='+encodeURIComponent(PATH)).then(r=>r.json()),
  fetch('/api/placed?path='+encodeURIComponent(PATH)).then(r=>r.json()),
  fetch('/api/layout?path='+encodeURIComponent(PATH)).then(r=>r.ok?r.json():{racks:[]}),
]).then(([ov,placed,layout])=>{
  const t=ov.totals;
  const zr=(ov.tree[0]&&ov.tree[0].regions[0])||{region:''};
  const zn=(zr.zones&&zr.zones[0])||{zone:PATH.split('/').pop()};
  document.getElementById('crumb').innerHTML=`${esc(zr.region)} / <b>${esc(zn.zone)}</b>`;
  document.getElementById('summary').innerHTML=`
    <div class="s"><span class="n">${won(t.capex)}</span><span class="l">투자비용(CAPEX)</span></div>
    <div class="s"><span class="n">${t.racks}</span><span class="l">랙</span></div>
    <div class="s"><span class="n">${t.servers}</span><span class="l">서버</span></div>
    <div class="s"><span class="n">${t.devices}</span><span class="l">전체 장비</span></div>
    <div class="s"><span class="n">${t.rack_types}</span><span class="l">Rack-Type</span></div>`;
  // device list
  const rows=placed.rows||[];
  document.getElementById('devcnt').textContent=rows.length+'행';
  document.getElementById('devbody').innerHTML = rows.map(r=>`<tr>
    <td>${esc(r.rack)}</td><td>${esc(r.name)}</td>
    <td><span class="dot" style="background:${CAT[r.category]||CAT.other}"></span>${esc(r.category)}</td>
    <td>${esc(r.release)}</td><td class="r">${r.qty}</td>
    <td class="r">${r.priced?won(r.subtotal):'<span style="color:#dc2626">미가격</span>'}</td></tr>`).join('')
    || '<tr><td colspan="6" class="empty">장비가 없습니다.</td></tr>';
  // elevations
  if((layout.racks||[]).length){
    scene.innerHTML=layout.racks.map(rk=>`<figure class="rack"><figcaption>${esc(rk.rack_id)}
      <small>${esc(rk.rack_model)} · ${rk.rack_u}U</small></figcaption>${rk.svg}</figure>`).join('');
    requestAnimationFrame(fit);
  } else { scene.innerHTML='<div class="empty">랙 실장도가 없습니다.</div>'; }
}).catch(e=>{ scene.innerHTML='<div class="empty">불러오기 실패: '+esc(e.message)+'</div>'; });
</script></body></html>
