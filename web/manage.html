<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bombom — 기준정보 관리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#0f172a;--panel:#fff;--ink:#0f172a;--muted:#64748b;--line:#e7ebf0;--line2:#e2e8f0;
    --accent:#2563eb;--accent2:#0ea5e9;--ok:#16a34a;--warn:#d97706;--new:#f59e0b;--bad:#dc2626;
    font-family:"Pretendard",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font:13px/1.45 "Pretendard",system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans KR',sans-serif;color:var(--ink);background:#f4f6f9;-webkit-font-smoothing:antialiased}
  /* ── canonical chrome ── */
  header.top{display:flex;gap:12px;align-items:center;padding:11px 22px;border-bottom:1px solid #e7ebf0;background:#fff;position:sticky;top:0;z-index:7;flex-wrap:wrap}
  header.top .logo{font-weight:800;font-size:17px;color:#2563eb;letter-spacing:-.2px}
  header.top .crumb{color:#64748b;font-size:13px}
  header.top nav{margin-left:auto;display:flex;gap:2px;align-items:center}
  header.top nav a{color:#475569;text-decoration:none;font-size:13px;padding:6px 11px;border-radius:7px}
  header.top nav a:hover{background:#f1f5f9}
  header.top nav a.on{color:#2563eb;background:#eff6ff;font-weight:700}
  /* ── shimmer skeleton ── */
  @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
  .sk{background:#e9edf2;background-image:linear-gradient(90deg,#e9edf2 0,#f3f6fa 200px,#e9edf2 400px);background-size:800px 100%;animation:shimmer 1.2s linear infinite;border-radius:8px}
  /* ── layout ── */
  .wrap{max-width:1100px;margin:0 auto;padding:18px 22px 60px;display:flex;flex-direction:column;gap:14px}
  .intro{color:var(--muted);font-size:13px;margin:0}
  /* error banner */
  .banner{display:none;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:10px;padding:12px 16px;font-size:13px}
  .banner.show{display:block}
  /* page bar (오퍼링 목록) */
  .pagebar{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .pagebar h3{margin:0;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .pagebar .spacer{flex:1}
  /* add controls */
  .addbtn{border:1px dashed var(--accent);background:#eff6ff;color:var(--accent);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  .addbtn:hover{background:#dbeafe}
  .addbtn.sm{padding:3px 9px;font-size:11px;border-radius:7px}
  .addform{display:none;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;padding:8px 10px;background:#f8fafc;border:1px solid var(--line2);border-radius:8px}
  .addform.show{display:flex}
  .addform input{border:1px solid var(--line2);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit}
  .addform input.id{width:170px}
  .addform input.nm{width:200px}
  .addform button{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit}
  .addform button:hover{filter:brightness(1.06)}
  .addform .err{color:var(--bad);font-size:12px}
  /* delete link (subtle) */
  .delbtn{border:none;background:none;color:#94a3b8;font-size:11px;cursor:pointer;padding:2px 4px;border-radius:5px;line-height:1;font-family:inherit}
  .delbtn:hover{color:var(--bad);background:#fef2f2}
  /* clone link (subtle, teal accent) */
  .clonebtn{border:none;background:none;color:#94a3b8;font-size:11px;cursor:pointer;padding:2px 4px;border-radius:5px;line-height:1;font-family:inherit}
  .clonebtn:hover{color:#0d9488;background:#f0fdfa}
  /* promoted zone actions */
  .zact{display:inline-flex;align-items:center;gap:4px;border-radius:8px;padding:5px 12px;font-size:11px;font-weight:600;text-decoration:none;line-height:1}
  .zact.dark{background:#0f172a;color:#fff;border:1px solid #0f172a}
  .zact.dark:hover{background:#1e293b}
  .zact.outline{background:#fff;border:1px solid #cbd5e1;color:#334155}
  .zact.outline:hover{background:#f8fafc;border-color:#94a3b8}
  /* node titles + ids */
  .nodename{font-weight:700}
  .nodeid{color:var(--muted);font-size:11px;margin-left:6px;font-variant-numeric:tabular-nums}
  /* offering card */
  .offering{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .offering > .head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .offering > .head .nodename{font-size:15px}
  /* nested levels via border-left indent */
  .region{margin:10px 0 0 4px;padding:8px 0 4px 14px;border-left:3px solid #bfdbfe}
  .zone{margin:8px 0 0 4px;padding:6px 0 2px 14px;border-left:3px solid #bbf7d0}
  .level-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tag{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border:1px solid var(--line2);border-radius:5px;padding:1px 6px;background:#f8fafc}
  /* rack-type chips */
  .rtlist{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 2px;padding-left:14px}
  .rtchip{display:flex;flex-direction:column;gap:1px;background:#faf5ff;border:1px solid #e9d5ff;border-radius:8px;padding:6px 12px;min-width:130px}
  .rtchip .rtname{font-weight:600;font-size:12px}
  .rtchip .rtmeta{font-size:11px;color:var(--muted)}
  .rt-empty{color:#94a3b8;font-size:12px;padding-left:14px}
  /* stats strip */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .stats .s{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  .stats .s .n{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .stats .s .l{color:var(--muted);font-size:11px;margin-top:4px}
  /* blue info callout */
  .note-split{display:flex;gap:8px;align-items:flex-start;background:#eff6ff;border:1px solid #dbeafe;color:#1e40af;border-radius:10px;padding:10px 14px;font-size:12.5px;line-height:1.5}
  .note-split a{color:#1d4ed8;font-weight:700;text-decoration:none}
  .note-split a:hover{text-decoration:underline}
  @media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
  /* empty state */
  .empty{color:#94a3b8;text-align:center;padding:24px 8px;font-size:13px;background:var(--panel);border:1px solid var(--line);border-radius:12px}
  /* toast */
  #toast{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:50}
  #toast .t{background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:8px 14px;font-size:12px;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:tin .2s ease}
  #toast .t.ok{border-color:#166534;color:#bbf7d0}
  #toast .t.bad{border-color:#7f1d1d;color:#fecaca}
  @keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media(max-width:720px){ .addform input.id,.addform input.nm{width:100%} }
</style>
</head>
<body>
<header class="top">
  <span class="logo">bombom</span><span class="crumb">— 기준정보</span>
  <nav>
    <a href="/">메인</a>
    <a href="/candidates">후보풀</a>
    <a href="/placed">배치 목록</a>
    <a href="/summary">투자 리포트</a>
    <a href="/manage" class="on">기준정보</a>
    <a href="/edit">랙관리</a>
  </nav>
</header>

<div class="wrap">
  <div class="banner" id="banner"></div>

  <p class="intro">오퍼링 → 리전 → 존(AZ) → Rack-Type 순으로 조직 계층(기준정보)을 만듭니다.</p>

  <div class="stats" id="stats"></div>

  <div class="note-split">
    <span>ℹ️</span>
    <span>여기서는 <b>조직 계층만 정의합니다.</b> 실제 랙 추가·모델 지정은
      <a href="/edit">랙관리</a>에서, 장비 배치는 <a href="/place">배치 화면</a>에서 진행합니다.</span>
  </div>

  <!-- top-level add offering -->
  <div class="pagebar">
    <h3>오퍼링 목록</h3>
    <span class="spacer"></span>
    <button type="button" class="addbtn" data-toggle="add-offering">＋ 오퍼링</button>
  </div>
  <div class="addform" id="add-offering">
    <input type="text" class="id" placeholder="오퍼링 id (영문/숫자/.-_)" data-field="offering">
    <input type="text" class="nm" placeholder="표시 이름 (선택)" data-field="name">
    <button type="button">추가</button>
    <span class="err"></span>
  </div>

  <!-- tree -->
  <div id="tree"></div>
</div>

<div id="toast"></div>

<script>
"use strict";

// ── helpers ──────────────────────────────────────────────────────────
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// POST JSON, return parsed body, throw Error(detail) on non-2xx
async function postJSON(url, body){
  const res = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  let data = null;
  try { data = await res.json(); } catch(e){ data = null; }
  if(!res.ok){
    const detail = (data && data.detail) ? data.detail : ('HTTP ' + res.status);
    const err = new Error(detail);
    err.status = res.status;
    throw err;
  }
  return data;
}

function showError(msg){
  const b = document.getElementById('banner');
  b.textContent = '기준정보를 불러오지 못했습니다: ' + msg + '  ·  API 서버가 떠 있는지 확인하세요.';
  b.classList.add('show');
}
function clearError(){
  const b = document.getElementById('banner');
  b.textContent = ''; b.classList.remove('show');
}

function toast(msg, kind){
  const wrap = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 't' + (kind ? (' ' + kind) : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function(){ el.remove(); }, 3000);
}

// map server status → friendly inline message
function friendly(err){
  switch(err && err.status){
    case 409: return '이미 존재합니다';
    case 404: return '상위 항목이 없습니다';
    case 422: return 'id 형식이 올바르지 않습니다 (영문/숫자/.-_)';
    case 400: return '필수 항목이 비어 있습니다';
    default:  return (err && err.message) ? err.message : '추가에 실패했습니다';
  }
}

// ── state ────────────────────────────────────────────────────────────
let HIER = [];

// ── tree render ──────────────────────────────────────────────────────
function rackTypeChip(rt, zCtx){
  const cnt = (rt.racks || []).length;
  const nm = (rt.name && rt.name !== rt.rack_type) ? rt.name : rt.rack_type;
  const rtCtx = {};
  if(zCtx){ Object.keys(zCtx).forEach(function(k){ rtCtx[k] = zCtx[k]; }); }
  rtCtx.rack_type = rt.rack_type;
  return '<div class="rtchip">'
    + '<span class="rtname">' + esc(nm) + '</span>'
    + '<span class="rtmeta">' + esc(rt.rack_type) + ' · 랙 ' + cnt
    +   ' ' + cloneControl('rack_type', rtCtx, nm)
    +   ' ' + delControl('rack_type', rtCtx, nm)
    + '</span>'
    + '</div>';
}

// hierarchy ctx → workspace path (matches the directory markers the loader reads)
function nodePath(ctx){
  let p = 'offerings/' + ctx.offering;
  if(ctx.region) p += '/regions/' + ctx.region;
  if(ctx.zone) p += '/zones/' + ctx.zone;
  if(ctx.rack_type) p += '/rack-types/' + ctx.rack_type;
  return p;
}

// download-this-scope-as-draw.io button: every rack beneath ctx on one editable canvas
function drawioButton(ctx){
  const url = '/api/rack/elevation.drawio?path=' + encodeURIComponent(nodePath(ctx)) + '&download=1';
  return '<a class="zact outline" href="' + url + '" title="이 범위의 랙 실장도를 draw.io(.drawio)로 내려받기">⬇ draw.io</a>';
}

// open-this-scope-in the interactive rack-layout view (zoom/pan/click-detail)
function layoutButton(ctx){
  const url = '/place?path=' + encodeURIComponent(nodePath(ctx));
  return '<a class="zact dark" href="' + url + '" title="이 범위의 랙 배치 화면(보기/편집)">🗺 배치 화면</a>';
}

function nameAndId(name, id){
  let h = '<span class="nodename">' + esc(name || id) + '</span>';
  if(name && name !== id){ h += '<span class="nodeid">' + esc(id) + '</span>'; }
  return h;
}

// build an inline add-form for a given level with prefilled parent context
function addControl(level, label, ctx){
  // ctx holds offering/region/zone parent ids; data-attrs let the handler read them
  const attrs = Object.keys(ctx).map(function(k){
    return 'data-' + k + '="' + esc(ctx[k]) + '"';
  }).join(' ');
  const idHint = level === 'rack_type' ? 'Rack-Type id (영문/숫자/.-_)' : (label + ' id (영문/숫자/.-_)');
  return '<button type="button" class="addbtn sm" data-add="' + level + '" ' + attrs + '>+ ' + esc(label) + '</button>'
    + '<div class="addform" data-form="' + level + '" ' + attrs + '>'
    +   '<input type="text" class="id" placeholder="' + esc(idHint) + '" data-field="id">'
    +   '<input type="text" class="nm" placeholder="표시 이름 (선택)" data-field="name">'
    +   '<button type="button">추가</button>'
    +   '<span class="err"></span>'
    + '</div>';
}

// build a subtle delete link for a given node.
// ctx holds this node's own id (under its level key) + all ancestor ids;
// name is the display name shown in the confirm dialog (plain text).
function delControl(level, ctx, name){
  const attrs = Object.keys(ctx).map(function(k){
    return 'data-' + k + '="' + esc(ctx[k]) + '"';
  }).join(' ');
  return '<button type="button" class="delbtn" data-del="' + level + '" '
    + 'data-name="' + esc(name) + '" ' + attrs + '>✕ 삭제</button>';
}

// build a subtle clone link for a given node — copies the whole subtree.
// ctx holds this node's own id (under its level key) + all ancestor ids;
// name is the display name (plain text), carried for parity with delControl.
function cloneControl(level, ctx, name){
  const attrs = Object.keys(ctx).map(function(k){
    return 'data-' + k + '="' + esc(ctx[k]) + '"';
  }).join(' ');
  return '<button type="button" class="clonebtn" data-clone="' + level + '" '
    + 'data-name="' + esc(name) + '" ' + attrs + '>⧉ 복제</button>';
}

function renderStats(){
  let nOff=0, nReg=0, nZone=0, nRt=0, nRack=0;
  HIER.forEach(function(o){
    nOff++;
    (o.regions||[]).forEach(function(rg){
      nReg++;
      (rg.zones||[]).forEach(function(z){
        nZone++;
        (z.rack_types||[]).forEach(function(rt){
          nRt++; nRack += (rt.racks||[]).length;
        });
      });
    });
  });
  const cells = [['오퍼링',nOff],['리전',nReg],['존(AZ)',nZone],['랙타입',nRt],['랙',nRack]];
  document.getElementById('stats').innerHTML = cells.map(function(c){
    return '<div class="s"><div class="n">'+c[1]+'</div><div class="l">'+c[0]+'</div></div>';
  }).join('');
}

// shimmer skeleton shown while GET /api/hierarchy is in flight
function renderSkeleton(){
  document.getElementById('stats').innerHTML =
    [0,0,0,0,0].map(function(){ return '<div class="s"><div class="sk" style="height:22px;width:40px"></div><div class="sk" style="height:11px;width:48px;margin-top:8px"></div></div>'; }).join('');
  document.getElementById('tree').innerHTML =
    '<div class="sk" style="height:180px"></div><div class="sk" style="height:130px;margin-top:14px"></div>';
}

function renderTree(){
  renderStats();
  const tree = document.getElementById('tree');
  if(!HIER.length){
    tree.innerHTML = '<div class="empty">등록된 오퍼링이 없습니다. 위의 “＋ 오퍼링”으로 첫 오퍼링을 추가하세요.</div>';
    return;
  }
  tree.innerHTML = HIER.map(function(off){
    const oCtx = { offering: off.offering };
    let html = '<div class="offering">';
    html += '<div class="head">' + nameAndId(off.name, off.offering)
          + addControl('region', '리전', oCtx)
          + cloneControl('offering', oCtx, off.name || off.offering)
          + delControl('offering', oCtx, off.name || off.offering) + '</div>';

    const regions = off.regions || [];
    if(!regions.length){
      html += '<div class="rt-empty" style="margin-top:8px">리전이 없습니다.</div>';
    }
    regions.forEach(function(reg){
      const rCtx = { offering: off.offering, region: reg.region };
      html += '<div class="region"><div class="level-head"><span class="tag">리전</span>'
            + nameAndId(reg.name, reg.region)
            + addControl('zone', '존', rCtx)
            + cloneControl('region', rCtx, reg.name || reg.region)
            + delControl('region', rCtx, reg.name || reg.region) + '</div>';

      const zones = reg.zones || [];
      if(!zones.length){
        html += '<div class="rt-empty">존이 없습니다.</div>';
      }
      zones.forEach(function(z){
        const zCtx = { offering: off.offering, region: reg.region, zone: z.zone };
        html += '<div class="zone"><div class="level-head"><span class="tag">존</span>'
              + nameAndId(z.name, z.zone)
              + addControl('rack_type', 'Rack-Type', zCtx)
              + ' ' + layoutButton(zCtx) + ' ' + drawioButton(zCtx)
              + cloneControl('zone', zCtx, z.name || z.zone)
              + delControl('zone', zCtx, z.name || z.zone) + '</div>';

        const rts = z.rack_types || [];
        if(rts.length){
          html += '<div class="rtlist">' + rts.map(function(rt){ return rackTypeChip(rt, zCtx); }).join('') + '</div>';
        } else {
          html += '<div class="rt-empty">Rack-Type이 없습니다.</div>';
        }
        html += '</div>'; // .zone
      });
      html += '</div>'; // .region
    });
    html += '</div>'; // .offering
    return html;
  }).join('');
}

// ── add submission ───────────────────────────────────────────────────
function bodyFor(form){
  const level = form.getAttribute('data-form');
  const idInput = form.querySelector('input[data-field="id"]');
  const nmInput = form.querySelector('input[data-field="name"]');
  const id = (idInput.value || '').trim();
  const name = (nmInput.value || '').trim();

  const body = { level: level };
  if(form.getAttribute('data-offering') != null) body.offering = form.getAttribute('data-offering');
  if(form.getAttribute('data-region')   != null) body.region   = form.getAttribute('data-region');
  if(form.getAttribute('data-zone')     != null) body.zone     = form.getAttribute('data-zone');

  // the new node's id goes into the field named after its level
  body[level] = id;
  if(name) body.name = name;
  return { body: body, id: id, name: name };
}

async function submitForm(form){
  const errEl = form.querySelector('.err');
  errEl.textContent = '';
  const built = bodyFor(form);
  if(!built.id){
    errEl.textContent = 'id를 입력하세요';
    return;
  }
  const labelMap = { offering:'오퍼링', region:'리전', zone:'존', rack_type:'Rack-Type' };
  const level = built.body.level;
  try{
    const data = await postJSON('/api/hierarchy', built.body);
    HIER = (data && data.hierarchy) ? data.hierarchy : HIER;
    clearError();
    renderTree();
    toast((labelMap[level] || '항목') + ' “' + (built.name || built.id) + '” 추가됨', 'ok');
  }catch(err){
    errEl.textContent = friendly(err);
    toast(friendly(err), 'bad');
  }
}

// ── delete submission ────────────────────────────────────────────────
// delBtn carries data-del (level) plus this node's id + ancestor ids as data-*.
async function submitDelete(delBtn){
  const level = delBtn.getAttribute('data-del');
  const name = delBtn.getAttribute('data-name') || '';
  if(!window.confirm('정말 삭제할까요? ' + name)) return;

  // collect ancestor + own ids in fixed hierarchy order, URL-encode each value
  const keys = ['offering','region','zone','rack_type'];
  const params = ['level=' + encodeURIComponent(level)];
  keys.forEach(function(k){
    const v = delBtn.getAttribute('data-' + k);
    if(v != null) params.push(k + '=' + encodeURIComponent(v));
  });
  const url = '/api/hierarchy?' + params.join('&');

  try{
    const res = await fetch(url, { method:'DELETE' });
    let data = null;
    try { data = await res.json(); } catch(e){ data = null; }
    if(!res.ok){
      if(res.status === 409){
        toast('하위 항목이 있어 삭제할 수 없습니다 (비운 뒤 삭제하세요)', 'bad');
      } else {
        const detail = (data && data.detail) ? data.detail : ('HTTP ' + res.status);
        toast(detail, 'bad');
      }
      return;
    }
    HIER = (data && data.hierarchy) ? data.hierarchy : HIER;
    clearError();
    renderTree();
    toast('삭제됨', 'ok');
  }catch(err){
    toast((err && err.message) ? err.message : '삭제에 실패했습니다', 'bad');
  }
}

// ── clone submission ─────────────────────────────────────────────────
// cloneBtn carries data-clone (level) plus this node's id + ancestor ids as data-*.
// Copies the whole subtree under a new id supplied via prompt().
async function submitClone(cloneBtn){
  const level = cloneBtn.getAttribute('data-clone');
  const name = window.prompt('복제본 이름 (하위 전체가 복사됩니다)', '');
  if(name == null) return;
  const newName = name.trim();
  if(!newName) return;

  // body carries the ancestor ids relevant to this level + the new id
  const keys = ['offering','region','zone','rack_type'];
  const body = { level: level, new_name: newName };
  keys.forEach(function(k){
    const v = cloneBtn.getAttribute('data-' + k);
    if(v != null) body[k] = v;
  });

  try{
    const data = await postJSON('/api/hierarchy/clone', body);
    HIER = (data && data.hierarchy) ? data.hierarchy : HIER;
    clearError();
    renderTree();
    toast('복제됨 → ' + newName, 'ok');
  }catch(err){
    if(err && err.status === 409){
      toast('같은 이름이 이미 있습니다', 'bad');
    } else if(err && err.status === 422){
      toast('이름 형식이 올바르지 않습니다', 'bad');
    } else {
      toast((err && err.message) ? err.message : '복제에 실패했습니다', 'bad');
    }
  }
}

// ── event wiring (delegated; survives re-render) ─────────────────────
document.addEventListener('click', function(ev){
  const t = ev.target;
  if(!(t instanceof Element)) return;

  // toggle the top-level offering form
  if(t.matches('[data-toggle="add-offering"]')){
    document.getElementById('add-offering').classList.toggle('show');
    return;
  }
  // delete an empty node
  const delBtn = t.closest('.delbtn[data-del]');
  if(delBtn){
    submitDelete(delBtn);
    return;
  }
  // clone a node's entire subtree
  const cloneBtn = t.closest('.clonebtn[data-clone]');
  if(cloneBtn){
    submitClone(cloneBtn);
    return;
  }
  // toggle an in-tree add form (sibling of the button)
  const addBtn = t.closest('.addbtn[data-add]');
  if(addBtn){
    const level = addBtn.getAttribute('data-add');
    // the form is the immediately following element with matching data-form
    let form = addBtn.nextElementSibling;
    while(form && form.getAttribute && form.getAttribute('data-form') !== level){
      form = form.nextElementSibling;
    }
    if(form) form.classList.toggle('show');
    return;
  }
  // submit button inside any addform
  const submitBtn = t.closest('.addform button');
  if(submitBtn){
    const form = submitBtn.closest('.addform');
    if(form.id === 'add-offering'){
      submitOfferingForm(form);
    } else {
      submitForm(form);
    }
    return;
  }
});

// Enter key submits the form the input belongs to
document.addEventListener('keydown', function(ev){
  if(ev.key !== 'Enter') return;
  const inp = ev.target;
  if(!(inp instanceof Element) || inp.tagName !== 'INPUT') return;
  const form = inp.closest('.addform');
  if(!form) return;
  ev.preventDefault();
  if(form.id === 'add-offering'){ submitOfferingForm(form); }
  else { submitForm(form); }
});

// the top-level offering form is structured slightly differently (fixed in markup)
async function submitOfferingForm(form){
  const errEl = form.querySelector('.err');
  errEl.textContent = '';
  const offInput = form.querySelector('input[data-field="offering"]');
  const nmInput = form.querySelector('input[data-field="name"]');
  const id = (offInput.value || '').trim();
  const name = (nmInput.value || '').trim();
  if(!id){ errEl.textContent = 'id를 입력하세요'; return; }
  const body = { level:'offering', offering:id };
  if(name) body.name = name;
  try{
    const data = await postJSON('/api/hierarchy', body);
    HIER = (data && data.hierarchy) ? data.hierarchy : HIER;
    offInput.value = ''; nmInput.value = '';
    form.classList.remove('show');
    clearError();
    renderTree();
    toast('오퍼링 “' + (name || id) + '” 추가됨', 'ok');
  }catch(err){
    errEl.textContent = friendly(err);
    toast(friendly(err), 'bad');
  }
}

// ── load ─────────────────────────────────────────────────────────────
(function load(){
  renderSkeleton();
  fetch('/api/hierarchy')
    .then(function(res){
      if(!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data){
      HIER = Array.isArray(data) ? data : [];
      clearError();
      renderTree();
    })
    .catch(function(err){
      HIER = [];
      renderTree();
      showError(err && err.message ? err.message : String(err));
    });
})();
</script>
